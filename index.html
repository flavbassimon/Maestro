<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Maestro</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lora:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f4ff;--white:#fff;--border:#e4dff5;--text:#1e1a2e;--muted:#7b7898;--soft:#b0aac8;
  --ind:#5b4fcf;--indl:#ede9ff;--indm:#c4bbf8;
  --mint:#2dbd8f;--mintl:#d6f5ec;
  --coral:#f0614a;--corall:#ffe8e5;
  --amb:#f5a623;--ambl:#fff3d6;
  --sky:#3b9edd;--skyl:#dff0ff;
  --vio:#9b6fe8;--viol:#f0e8ff;
  --r:14px;--rs:8px;
  --sh:0 2px 12px rgba(91,79,207,.07);
}
body.dark{
  --bg:#0f0e17;--white:#1a1925;--border:#2a2840;--text:#e8e6f0;--muted:#8888a8;--soft:#55527a;
  --ind:#7c6fe8;--indl:#1e1b3a;--indm:#3d3870;
  --mintl:#0d2a1e;--corall:#2a1210;--ambl:#2a2000;--skyl:#0d2035;--viol:#1e1830;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;}

/* ── SCREENS ── */
.scr{display:none;min-height:100vh;flex-direction:column;}
.scr.on{display:flex;}

/* ── LANDING ── */
#sL{align-items:center;justify-content:center;background:linear-gradient(145deg,#f0edff,#e8f5ff,#eafffa);padding:32px 20px;}
body.dark #sL{background:linear-gradient(145deg,#0f0c29,#0a1a2e,#0a1f14);}
.land-inner{width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;text-align:center;}
.land-logo{font-family:'Lora',serif;font-size:2.6rem;font-weight:600;color:var(--ind);margin-bottom:4px;}
.land-sub{font-size:.72rem;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-bottom:40px;}
.land-btn{width:100%;padding:14px;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:800;cursor:pointer;margin-bottom:10px;transition:all .2s;}
.land-btn-p{background:var(--ind);color:white;}
.land-btn-p:hover{background:#4a3fb8;box-shadow:0 4px 14px rgba(91,79,207,.3);}
.land-btn-s{background:transparent;border:1.5px solid var(--indm);color:var(--ind);}
.land-btn-s:hover{background:var(--indl);}

/* ── AUTH ── */
#sA{align-items:center;justify-content:center;background:linear-gradient(145deg,#f0edff,#e8f5ff);padding:24px 20px;}
body.dark #sA{background:linear-gradient(145deg,#0f0c29,#0a1a2e);}
.abox{background:var(--white);border-radius:18px;padding:24px;width:100%;max-width:370px;box-shadow:0 16px 50px rgba(91,79,207,.13);}
.alogo{font-family:'Lora',serif;font-size:1.8rem;font-weight:600;color:var(--ind);text-align:center;margin-bottom:4px;}
.asub{font-size:.75rem;color:var(--muted);text-align:center;margin-bottom:18px;}
.afield{margin-bottom:10px;}
.afield label{font-size:.65rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:3px;}
.aerr{background:var(--corall);border:1.5px solid var(--coral);color:var(--coral);border-radius:8px;padding:8px 10px;font-size:.78rem;font-weight:700;margin-bottom:10px;display:none;}
.aok{background:var(--mintl);border:1.5px solid var(--mint);color:var(--mint);border-radius:8px;padding:8px 10px;font-size:.78rem;font-weight:700;margin-bottom:10px;display:none;}
.arole{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.arole-btn{padding:10px;border-radius:10px;border:2px solid var(--border);background:var(--bg);cursor:pointer;text-align:center;font-family:'Nunito',sans-serif;transition:all .2s;}
.arole-btn.on{border-color:var(--ind);background:var(--indl);}
.arole-ico{font-size:1.4rem;display:block;margin-bottom:3px;}
.arole-lbl{font-size:.75rem;font-weight:800;color:var(--text);}

/* ── TOPBAR ── */
.tb{background:rgba(255,255,255,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(91,79,207,.1);padding:0 14px;height:54px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:200;box-shadow:0 1px 14px rgba(91,79,207,.06);flex-shrink:0;}
body.dark .tb{background:rgba(15,14,23,.92);border-bottom-color:rgba(155,111,232,.12);}
.tb-logo{font-family:'Lora',serif;font-size:1.1rem;font-weight:600;color:var(--ind);font-style:italic;flex-shrink:0;}
.tb-page{flex:1;font-size:.78rem;font-weight:800;color:var(--text);padding:0 6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tb-acts{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.tb-icon{width:34px;height:34px;border-radius:10px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .18s;}
.tb-icon:hover{border-color:var(--ind);background:var(--indl);}
.tb-quit{padding:4px 10px;border:1.5px solid var(--border);border-radius:20px;background:transparent;font-family:'Nunito',sans-serif;font-size:.7rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .18s;}
.tb-quit:hover{border-color:var(--coral);color:var(--coral);}
.dtog{width:34px;height:20px;background:var(--border);border-radius:20px;position:relative;cursor:pointer;transition:background .2s;border:none;flex-shrink:0;}
.dtog::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:white;top:3px;left:3px;transition:transform .2s;}
.dtog.on{background:var(--ind);}
.dtog.on::after{transform:translateX(14px);}

/* ── MAIN ── */
.main{flex:1;min-width:0;}
.pg{display:none;animation:fu .22s ease;}
.pg.on{display:block;}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── NAV OVERLAY ── */
.nav-ov{position:fixed;inset:0;z-index:1000;display:none;}
.nav-ov.on{display:block;}
.nav-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(5px);}
.nav-sheet{position:absolute;bottom:0;left:0;right:0;background:var(--white);border-radius:22px 22px 0 0;padding:12px 14px 40px;max-height:88vh;overflow-y:auto;animation:shUp .28s cubic-bezier(.34,1.1,.64,1);}
@keyframes shUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.nav-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 14px;}
.nav-role-lbl{font-size:.62rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding:0 2px;}
.nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:11px 5px 9px;border-radius:14px;cursor:pointer;border:2px solid transparent;background:var(--bg);transition:all .18s;-webkit-tap-highlight-color:transparent;}
.nav-item:active{transform:scale(.91);}
.nav-item.on{background:var(--indl);border-color:var(--indm);}
.nav-ico{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;}
.nav-lbl{font-size:.6rem;font-weight:800;color:var(--text);text-align:center;line-height:1.2;}
.nav-item.on .nav-lbl{color:var(--ind);}
.nc-ind{background:var(--indl);}
.nc-mint{background:var(--mintl);}
.nc-coral{background:var(--corall);}
.nc-amb{background:var(--ambl);}
.nc-sky{background:var(--skyl);}
.nc-vio{background:var(--viol);}
.nc-dark{background:var(--border);}
.nav-badge{position:absolute;top:-4px;right:-4px;background:var(--coral);color:white;border-radius:10px;font-size:.58rem;font-weight:900;padding:1px 5px;min-width:16px;text-align:center;}

/* ── MODAL ── */
.mo{position:fixed;inset:0;background:rgba(30,26,46,.28);backdrop-filter:blur(4px);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.mo.on{display:flex;}
@media(min-width:600px){.mo.on{align-items:center;padding:16px;}}
.mb{background:var(--white);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:420px;box-shadow:0 -8px 40px rgba(91,79,207,.14);max-height:90vh;overflow-y:auto;animation:fu .2s ease;}
@media(min-width:600px){.mb{border-radius:18px;}}

/* ── TYPOGRAPHY ── */
.pt{font-family:'Lora',serif;font-size:1.3rem;font-weight:600;color:var(--text);}
.ps{font-size:.77rem;color:var(--muted);margin-top:2px;margin-bottom:12px;}
.ct{font-size:.83rem;font-weight:800;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.sl{font-size:.62rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--soft);margin-bottom:6px;display:block;}
.lb{font-size:.64rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;display:block;}

/* ── LAYOUT ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px;}
.row{display:flex;align-items:center;gap:8px;}
.sp{flex:1;}
@media(max-width:680px){.g2,.g3{grid-template-columns:1fr;}}

/* ── CARDS ── */
.card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--sh);}
.sc{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:12px 14px;box-shadow:var(--sh);position:relative;overflow:hidden;}
.scb{position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px;}
.scl{font-size:.61rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.scv{font-family:'Lora',serif;font-size:1.65rem;font-weight:600;line-height:1;color:var(--text);}
.scs{font-size:.66rem;color:var(--soft);margin-top:2px;}

/* ── BUTTONS ── */
.btn{padding:8px 14px;border-radius:20px;font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:800;cursor:pointer;transition:all .18s;border:none;display:inline-flex;align-items:center;gap:4px;}
.bp{background:var(--ind);color:white;}.bp:hover{background:#4a3fb8;}
.bm{background:var(--mint);color:white;}.bm:hover{background:#24a87e;}
.bg2{background:transparent;border:1.5px solid var(--border);color:var(--muted);}.bg2:hover{border-color:var(--ind);color:var(--ind);}
.bd{background:var(--corall);color:var(--coral);border:1.5px solid #ffc5bd;}.bd:hover{background:var(--coral);color:white;}
.bs{padding:5px 11px;font-size:.71rem;}

/* ── INPUTS ── */
input,select,textarea{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rs);padding:7px 10px;font-family:'Nunito',sans-serif;font-size:.82rem;color:var(--text);outline:none;transition:border .18s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--ind);background:var(--white);}

/* ── STUDENT ROW ── */
.str{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 13px;display:grid;grid-template-columns:34px 1fr auto;align-items:center;gap:9px;cursor:pointer;transition:all .18s;box-shadow:var(--sh);margin-bottom:6px;}
.str:hover{border-color:var(--indm);transform:translateX(2px);}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:900;color:white;flex-shrink:0;}
.stn{font-size:.84rem;font-weight:800;}
.stm{font-size:.64rem;color:var(--muted);margin-top:1px;}
.mpb{height:4px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:3px;}
.mpf{height:100%;border-radius:3px;transition:width .4s;}

/* ── WEEK BARS ── */
.wbs{display:flex;align-items:flex-end;gap:4px;height:60px;}
.wbw{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;}
.wb{width:100%;border-radius:3px 3px 0 0;min-height:3px;background:var(--indm);transition:height .4s;}
.wbl{font-size:.55rem;font-weight:700;color:var(--soft);text-transform:uppercase;}

/* ── RING ── */
.rw{position:relative;display:inline-flex;align-items:center;justify-content:center;}
.rc{position:absolute;text-align:center;}
.rp{font-family:'Lora',serif;font-size:1.5rem;font-weight:600;color:var(--text);}
.rsb{font-size:.57rem;font-weight:700;color:var(--muted);}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:16px;right:16px;max-width:340px;margin:0 auto;background:var(--ind);color:white;border-radius:12px;padding:10px 15px;font-size:.8rem;font-weight:700;z-index:9999;box-shadow:0 8px 22px rgba(91,79,207,.3);animation:fu .25s ease;}

/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:.62rem;font-weight:800;}
.ti{background:var(--indl);color:var(--ind);}
.tm{background:var(--mintl);color:var(--mint);}
.tc{background:var(--corall);color:var(--coral);}
.ta{background:var(--ambl);color:var(--amb);}

/* ── TASKS ── */
.ti2{background:var(--white);border:1.5px solid var(--border);border-radius:9px;padding:8px 10px;display:flex;align-items:center;gap:7px;transition:all .16s;margin-bottom:4px;}
.tc2{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.55rem;cursor:pointer;transition:all .18s;}
.tc2.on{background:var(--mint);border-color:var(--mint);color:white;}
.ttn{font-size:.82rem;font-weight:700;}
.ttm{font-size:.63rem;color:var(--muted);}
.pd{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* ── METRO ── */
.metro-wrap{background:linear-gradient(170deg,#0a0818,#1a1040,#0d0d25);border-radius:18px;padding:20px 16px;position:relative;overflow:hidden;}
.metro-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% -20%,rgba(155,111,232,.25),transparent 60%);pointer-events:none;}
.metro-bpm{font-family:'Lora',serif;font-size:4.8rem;font-weight:600;color:white;text-align:center;line-height:1;letter-spacing:-2px;text-shadow:0 0 30px rgba(155,111,232,.5);position:relative;}
.metro-lbl{font-size:.7rem;font-weight:700;color:var(--vio);text-align:center;margin:2px 0 8px;min-height:16px;}
.mbeat{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.15);transition:all .04s;display:inline-block;margin:0 3px;}
.mbeat.on{background:var(--amb);border-color:var(--amb);box-shadow:0 0 12px rgba(245,166,35,.8);transform:scale(1.25);}
.mbeat.on.first{background:#ff6b9d;border-color:#ff6b9d;box-shadow:0 0 12px rgba(255,107,157,.8);}
.mbtn{padding:7px 14px;border-radius:16px;font-family:'Nunito',sans-serif;font-size:.77rem;font-weight:800;cursor:pointer;border:none;transition:all .16s;}
.mbtn-ghost{background:rgba(255,255,255,.1);color:white;}.mbtn-ghost:hover{background:rgba(255,255,255,.2);}
.mbtn-play{background:linear-gradient(135deg,var(--vio),var(--ind));color:white;padding:9px 20px;font-size:.84rem;}
.mbtn-play.on{background:linear-gradient(135deg,var(--coral),#c0392b);}
.sig-btn{padding:5px 8px;border-radius:16px;font-family:'Nunito',sans-serif;font-size:.7rem;font-weight:800;cursor:pointer;border:1.5px solid rgba(255,255,255,.18);background:transparent;color:rgba(255,255,255,.5);transition:all .16s;}
.sig-btn.on{background:rgba(155,111,232,.4);border-color:var(--vio);color:white;}
.tap-btn{background:linear-gradient(135deg,var(--vio),var(--ind));color:white;border:none;padding:11px 22px;border-radius:13px;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:900;cursor:pointer;letter-spacing:2px;transition:transform .1s;}
.tap-btn:active{transform:scale(.9);}
.snd-sel{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);color:white;border-radius:8px;padding:5px 10px;font-size:.75rem;font-family:'Nunito',sans-serif;cursor:pointer;width:auto;}

/* ── TUNER ── */
.tuner-wrap{background:linear-gradient(170deg,#041a10,#082a18,#051510);border-radius:18px;padding:20px 16px;overflow:hidden;}
.note-big{font-family:'Lora',serif;font-size:5.5rem;font-weight:600;line-height:1;text-align:center;transition:color .1s;}
.freq-disp{font-size:.8rem;font-weight:700;text-align:center;color:rgba(255,255,255,.3);margin-top:2px;}
.tuner-stat{font-size:.72rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;text-align:center;margin-top:4px;min-height:16px;transition:color .12s;}
.tstr{flex:1;text-align:center;padding:6px 2px;border-radius:9px;cursor:pointer;border:1.5px solid rgba(255,255,255,.1);transition:all .18s;}
.tstr:hover{background:rgba(255,255,255,.08);}
.tstr.active{background:rgba(45,189,143,.18);border-color:rgba(45,189,143,.45);}
.tsn{font-size:.76rem;font-weight:800;color:white;}
.tsf{font-size:.57rem;color:rgba(255,255,255,.3);margin-top:1px;}

/* ── TOOLS GRID ── */
.tcard{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:15px;box-shadow:var(--sh);margin-bottom:12px;}
.ttitle{font-family:'Lora',serif;font-size:.98rem;font-weight:600;color:var(--text);margin-bottom:2px;}
.tsub{font-size:.71rem;color:var(--muted);margin-bottom:10px;}
.tool-tile{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:14px 12px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:var(--sh);}
.tool-tile:hover{transform:translateY(-2px);border-color:var(--indm);box-shadow:0 4px 18px rgba(91,79,207,.12);}
.tool-tile.on{border-color:var(--ind);background:var(--indl);}
.tool-ico{font-size:1.8rem;margin-bottom:5px;}
.tool-name{font-size:.76rem;font-weight:800;color:var(--text);}
.tool-desc{font-size:.62rem;color:var(--muted);margin-top:2px;line-height:1.3;}

/* ── MISC ── */
.al{border-radius:9px;padding:9px 11px;font-size:.76rem;font-weight:600;margin-bottom:8px;display:flex;align-items:flex-start;gap:6px;}
.alw{background:var(--corall);border:1.5px solid #ffc5bd;color:#c0402e;}
.alo{background:var(--mintl);border:1.5px solid #a8e8d4;color:#1a8a65;}
.ali{background:var(--skyl);border:1.5px solid #a8d8f8;color:#1a6ea8;}
.bigt{font-family:'Lora',serif;font-size:3.2rem;font-weight:600;text-align:center;color:var(--ind);letter-spacing:2px;line-height:1;}
hr{border:none;border-top:1px solid var(--border);margin:10px 0;}
.hrow{background:var(--white);border:1.5px solid var(--border);border-radius:9px;padding:8px 12px;display:flex;align-items:center;gap:8px;margin-bottom:4px;}

/* ── MESSAGES ── */
.msg-thread{max-height:340px;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:8px;}
.msg-bubble{border-radius:12px;padding:8px 11px;max-width:80%;font-size:.8rem;line-height:1.55;}
.msg-from-me{background:var(--ind);color:white;border-radius:12px 12px 0 12px;align-self:flex-end;}
.msg-from-prof{background:var(--indl);color:var(--text);border-radius:12px 12px 12px 0;border:1.5px solid var(--indm);}
.msg-meta{font-size:.6rem;color:var(--muted);margin-top:2px;}
.msg-input-row{display:flex;align-items:flex-end;gap:6px;padding-top:10px;border-top:1px solid var(--border);margin-top:4px;}
.msg-input{resize:none;min-height:36px;max-height:100px;border-radius:12px;padding:8px 10px;font-size:.82rem;flex:1;}
.msg-send{width:36px;height:36px;border-radius:50%;background:var(--ind);border:none;color:white;font-size:1rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.msg-inbox-item{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:5px;transition:all .18s;}
.msg-inbox-item:hover,.msg-inbox-item.has-unread{border-color:var(--ind);}
.msg-inbox-preview{font-size:.7rem;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;}
.msg-read-tick{font-size:.6rem;margin-left:4px;color:rgba(255,255,255,.6);}
.msg-read-tick.read{color:#a8f0d4;}

/* ── GAMIF ── */
.dash-hero{background:linear-gradient(135deg,#0f0c29,#302b63,#1a0a2e);border-radius:18px;padding:18px;color:white;margin-bottom:12px;position:relative;overflow:hidden;}
.dash-hero::after{content:'♩';position:absolute;font-size:6rem;right:-6px;bottom:-16px;opacity:.05;line-height:1;}
.xp-bar-wrap{height:6px;background:rgba(255,255,255,.12);border-radius:4px;overflow:hidden;margin:5px 0;}
.xp-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--vio),var(--ind));transition:width .5s;}
.xp-pill{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.12);padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:700;}
.bc{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:11px 7px;text-align:center;transition:all .2s;box-shadow:var(--sh);}
.bc.on{border-color:var(--amb);background:linear-gradient(135deg,#fffbe8,#fff8d0);}
.bi{font-size:1.6rem;margin-bottom:3px;filter:grayscale(1)opacity(.2);transition:filter .3s;}
.bc.on .bi{filter:none;}
.bn{font-size:.7rem;font-weight:800;color:var(--text);}
.mission-card{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:6px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh);}
.mission-xp{background:var(--ambl);border:1.5px solid var(--amb);color:#9a6000;padding:2px 8px;border-radius:20px;font-size:.68rem;font-weight:800;white-space:nowrap;}
.lvl-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:800;}
.defi-bar{height:5px;background:rgba(91,79,207,.15);border-radius:4px;overflow:hidden;margin-top:6px;}
.defi-bar-fill{height:100%;border-radius:4px;background:var(--vio);transition:width .5s;}

/* ── STATS ── */
.stat-table{width:100%;border-collapse:collapse;font-size:.75rem;}
.stat-table th{text-align:center;padding:5px 3px;color:var(--muted);font-weight:800;font-size:.62rem;letter-spacing:1px;text-transform:uppercase;border-bottom:2px solid var(--border);}
.stat-table td{text-align:center;padding:7px 3px;border-bottom:1px solid var(--border);}
.stat-table td:first-child{text-align:left;}
.heatrow{display:flex;gap:2px;}
.heatcell{flex:1;height:18px;border-radius:2px;min-width:6px;}

/* ── SESSION PROGRESS ── */
#spBar{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:12px;}
.sp-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.sp-track{height:9px;background:var(--bg);border-radius:5px;overflow:hidden;}
.sp-fill{height:100%;border-radius:5px;transition:width .5s;}
.sp-foot{display:flex;justify-content:space-between;margin-top:3px;}

/* ── POM ── */
.pom-time{font-family:'Lora',serif;font-size:2.4rem;font-weight:600;color:var(--text);position:absolute;}
.pom-ph{font-size:.58rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;position:absolute;top:62%;}

/* ── TIMELINE ── */
.tl-item{display:flex;gap:11px;margin-bottom:16px;position:relative;}
.tl-dot{width:12px;height:12px;border-radius:50%;background:var(--ind);flex-shrink:0;margin-top:3px;box-shadow:0 0 0 3px var(--indl);}
.tl-line{position:absolute;left:5px;top:15px;bottom:-16px;width:2px;background:linear-gradient(180deg,var(--indm),transparent);}
.tl-content{flex:1;background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;box-shadow:var(--sh);}

/* ── SKILL TREE ── */
.sk-ico{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin:0 auto;border:2.5px solid var(--border);background:var(--bg);transition:all .2s;cursor:pointer;}
.sk-ico.unlocked{border-color:var(--ind);background:var(--indl);}

/* ── COFFERS ── */
.chest{width:74px;height:74px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;background:linear-gradient(135deg,#8B5E3C,#5a3510);border:3px solid #4a2800;margin:0 auto;box-shadow:0 5px 16px rgba(0,0,0,.28);cursor:pointer;transition:all .18s;}
.chest:hover{transform:scale(1.06);}

/* ── CAL ── */
.calg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cday{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.67rem;font-weight:700;position:relative;}
.cday.has{background:var(--indl);color:var(--ind);}
.cday.tod{background:var(--ind);color:white;font-weight:900;}
.cday.out{opacity:.3;}
.cday.has::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--ind);}
.cday.tod::after{background:white;}

/* ── RECORDER ── */
.rec-wave-wrap{background:#080810;border-radius:10px;height:50px;margin-bottom:10px;overflow:hidden;position:relative;}
.rec-wave-wrap canvas{width:100%;height:100%;}
.rec-time-disp{position:absolute;top:50%;right:10px;transform:translateY(-50%);font-family:monospace;font-size:.9rem;color:white;font-weight:700;}
.rec-prog-track{height:5px;background:var(--bg);border-radius:3px;margin-bottom:12px;overflow:hidden;}
.rec-prog-fill{height:100%;width:0%;background:var(--coral);border-radius:3px;}

/* PROF STATS */
.day-chip{display:inline-flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0;}
.day-chip-bar{width:100%;border-radius:3px;background:var(--indm);}
.day-chip-lbl{font-size:.52rem;font-weight:700;color:var(--soft);text-transform:uppercase;}
@keyframes bounce{from{transform:scale(1)}to{transform:scale(1.14)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* Base app layout */
#sAp{display:flex;flex-direction:column;height:100vh;overflow:hidden;width:100%}
#sAp.on{display:flex}
#apBody{flex:1;display:flex;flex-direction:row;overflow:hidden;min-height:0;align-items:stretch;margin:0;padding:0}
#aM{flex:1;min-width:0;overflow-y:auto;padding:14px}

  }

  }

    width:186px;min-width:186px;flex-shrink:0;

    margin:0
  }
  .desktop-sidebar .nav-item{

  }
  .desktop-sidebar .nav-ico{width:30px;height:30px;font-size:.95rem;border-radius:8px;flex-shrink:0}

  .ga{grid-template-columns:repeat(5,1fr)}
  .mo.on{align-items:center;padding:20px}

function p2(n){ return n<10?'0'+n:String(n); }

function tday(){
  var d=new Date();
  return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());
}

function lk(dt){
  return dt.getFullYear()+'-'+p2(dt.getMonth()+1)+'-'+p2(dt.getDate());
}

function nowHHMM(){
  var n=new Date(); return p2(n.getHours())+':'+p2(n.getMinutes());
}

function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, dur){
  var el=document.getElementById('_toast');
  if(!el){ el=document.createElement('div'); el.id='_toast'; el.className='toast'; document.body.appendChild(el); }
  el.textContent=msg; el.style.display='block';
  clearTimeout(el._t);
  el._t=setTimeout(function(){ el.style.display='none'; }, dur||2400);
}

// Synchroniser les données Firebase vers localStorage au démarrage
function fbSyncFromCloud(callback){
  if(!fbDb){ if(callback) callback(); return; }
  // Lire auth + data en parallèle
  var done=0;
  function onDone(){ done++; if(done>=2 && callback) callback(); }

  // Comptes utilisateurs
  fbDb.ref('auth').once('value',function(snap){
    var data=snap.val();
    if(data){
      if(data.users)    localStorage.setItem('m8_auth_users',    JSON.stringify(data.users));
      if(data.requests) localStorage.setItem('m8_auth_requests', JSON.stringify(data.requests));
    }
    onDone();
  },function(){ onDone(); });

  // Sessions + données élèves
  fbDb.ref('data').once('value',function(snap){
    var data=snap.val();
    if(data){
      Object.keys(data).forEach(function(sid){
        var remote=data[sid];
        if(!remote) return;
        var localRaw=localStorage.getItem('m6_d_'+sid);
        if(localRaw){
          // Fusionner : garder le plus récent
          try{
            var local=JSON.parse(localRaw);
            var merged=mergeStudentData(local,remote);
            localStorage.setItem('m6_d_'+sid,JSON.stringify(merged));
          }catch(e){ localStorage.setItem('m6_d_'+sid,JSON.stringify(remote)); }
        } else {
          localStorage.setItem('m6_d_'+sid,JSON.stringify(remote));
        }
      });
    }
    onDone();
  },function(){ onDone(); });

  // Sts prof (si connecté en prof)
  if(role==='prof' && uid){
    fbDb.ref('prof/'+uid+'/sts').once('value',function(snap){
      var v=snap.val();
      if(v) localStorage.setItem('m6_sts',JSON.stringify(v));
    });
  }
}

function mergeStudentData(local, remote){
  // Fusionner sessions : prendre le max de chaque jour
  var merged=JSON.parse(JSON.stringify(remote));
  var lSess=local.sessions||{}, rSess=remote.sessions||{};
  merged.sessions=JSON.parse(JSON.stringify(rSess));
  Object.keys(lSess).forEach(function(k){
    var lv=typeof lSess[k]==='object'?lSess[k].total:lSess[k];
    var rv=merged.sessions[k]?(typeof merged.sessions[k]==='object'?merged.sessions[k].total:merged.sessions[k]):0;
    if(lv>rv) merged.sessions[k]=lSess[k];
  });
  // Garder les tâches locales si plus récentes
  if((local.tasks||[]).length>(remote.tasks||[]).length) merged.tasks=local.tasks;
  // Garder avatar config local
  if(local.avatarConfig) merged.avatarConfig=local.avatarConfig;
  // Max pour les compteurs
  merged.tasksDone=Math.max(local.tasksDone||0, remote.tasksDone||0);
  merged.chestsOpened=Math.max(local.chestsOpened||0, remote.chestsOpened||0);
  merged.weekGoal=local.weekGoal||remote.weekGoal||200;
  // Fusionner historique coffres (dédupliquer par ts)
  var lh=local.chestHistory||[], rh=remote.chestHistory||[];
  var allH=lh.concat(rh);
  var seen={};
  merged.chestHistory=allH.filter(function(h){ if(seen[h.ts]) return false; seen[h.ts]=1; return true; });
  return merged;
}

// ══════════════════════════════════════════════
// SESSION HELPERS
// ══════════════════════════════════════════════
function sesMins(raw){
  if(!raw) return 0;
  if(typeof raw==='number') return raw;
  return raw.total||0;
}

function sesRead(d,k){
  var raw=(d.sessions||{})[k];
  if(!raw) return {total:0, entries:[]};
  if(typeof raw==='number') return {total:raw, entries:[]};
  return raw;
}

function sesWrite(d,k,mins,st,et){
  d.sessions=d.sessions||{};
  var cur=sesRead(d,k);
  cur.total=(cur.total||0)+mins;
  if(st){ cur.entries=cur.entries||[]; cur.entries.push({start:st, end:et||'', mins:mins}); }
  d.sessions[k]=cur;
}

function gStats(d){
  var sess=d.sessions||{};
  var keys=Object.keys(sess).filter(function(k){ return k.length===10; });
  var tm=keys.reduce(function(s,k){ return s+sesMins(sess[k]); }, 0);
  var now=new Date(); now.setHours(0,0,0,0);
  var st=0;
  for(var i=0;i<365;i++){
    var dd=new Date(now); dd.setDate(now.getDate()-i);
    if(sesMins(sess[lk(dd)])>0) st++; else break;
  }
  var dow=now.getDay()===0?6:now.getDay()-1;
  var wm=0;
  for(var j=0;j<=dow;j++){
    var dj=new Date(now); dj.setDate(now.getDate()-j);
    wm+=sesMins(sess[lk(dj)]);
  }
  var md=Math.max.apply(null,[0].concat(keys.map(function(k){ return sesMins(sess[k]); })));
  var rep=d.repProg||{};
  var sec=Object.values(rep).reduce(function(s,v){ return s+(Array.isArray(v)?v.length:0); },0);
  return {tm:tm, st:st, wm:wm, md:md, td:d.tasksDone||0, gh:d.goalsHit||0, sec:sec};
}

function wHist(sess,n){
  n=n||8;
  var now=new Date(); now.setHours(0,0,0,0);
  var result=[];
  for(var wi=0;wi<n;wi++){
    var t=0;
    for(var dd=0;dd<7;dd++){
      var day=new Date(now); day.setDate(now.getDate()-7*(n-1-wi)-dd);
      t+=sesMins(sess[lk(day)]);
    }
    result.push(t);
  }
  return result;
}

function getScore(d){
  var s=gStats(d); var pct=Math.min(100,Math.round(s.wm/(d.weekGoal||200)*100));
  return Math.min(500, Math.min(s.st*15,150)+Math.min(s.td*5,100)+Math.min(Math.round(s.tm/6),150)+Math.round(pct*0.6));
}

function getXP(d){
  var s=gStats(d);
  return s.tm*2 + s.st*10 + s.td*15 + s.gh*25;
}

function hashPw(pw){
  if(typeof crypto!=='undefined'&&crypto.subtle){
    try{
      return crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw)).then(function(buf){
        return Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
      });
    }catch(e){}
  }
  return Promise.resolve((function(s){
    var h=5381;
    for(var i=0;i<s.length;i++){ h=((h<<5)+h)^s.charCodeAt(i); h=h&h; }
    var r=Math.abs(h).toString(16);
    for(var k=0;k<8;k++){ var h2=0; for(var j=0;j<r.length;j++) h2=((h2<<5)+h2)^r.charCodeAt(j); r+=Math.abs(h2).toString(16); }
    return r.padStart(64,'0').slice(0,64);
  })(pw));
}

  fbSyncFromCloud(function(){

      if(saved&&saved.id){

        if(fresh){ _authUser=fresh; sessionStorage.setItem('m8_session',JSON.stringify(fresh)); }

      }
    }catch(e){}
    shS('sL');
  });
}

function showAErr(m){ var el=document.getElementById('aErr'); el.textContent=m; el.style.display='flex'; }
function showAOk(m){ var el=document.getElementById('aOk'); el.textContent=m; el.style.display='flex'; }

function doLogin(){
  var email=(document.getElementById('lEmail').value||'').toLowerCase().trim();
  var pw=document.getElementById('lPw').value||'';
  clearAMsg();
  // Admin check
  if(email==='admin@maestro.app'){
    hashPw(pw).then(function(hash){
      var stored=localStorage.getItem('m8_adminHash');
      if(!stored){ localStorage.setItem('m8_adminHash',hash); stored=hash; }
      if(hash===stored){
        _authUser={id:'admin',email:'admin@maestro.app',name:'Administrateur',role:'admin'};
        sessionStorage.setItem('m8_session',JSON.stringify(_authUser));
        showAOk('Connexion admin...');
        setTimeout(function(){ shS('sAdmin'); renderAdmin(); }, 500);
      } else { showAErr('Mot de passe incorrect.'); }
    });
    return;
  }
  var users=DB.users();
  var user=Object.values(users).find(function(u){ return u.email===email; });
  if(!user){ showAErr('Aucun compte avec cet email.'); return; }
  if(user.status==='banned'){ showAErr('Compte désactivé.'); return; }
  hashPw(pw).then(function(hash){
    if(hash!==user.pwHash){ showAErr('Mot de passe incorrect.'); return; }
    _authUser=user;
    sessionStorage.setItem('m8_session',JSON.stringify(user));
    showAOk('Connexion...');
    setTimeout(afterLogin, 500);
  });
}

function doRegister(){
  if(document.getElementById('regStep2').style.display!=='none'){doRegisterFinal();return;}
  var name=(document.getElementById('rName').value||'').trim();
  var email=(document.getElementById('rEmail').value||'').toLowerCase().trim();
  var pw=document.getElementById('rPw').value||'';
  clearAMsg();
  if(!name){showAErr('Entrez votre nom.');return;}
  if(!email.includes('@')){showAErr('Email invalide.');return;}
  if(pw.length<6){showAErr('Mot de passe trop court.');return;}
  if(Object.values(DB.users()).find(function(u){return u.email===email;})){showAErr('Email déjà utilisé.');return;}
  if(_regRole==='prof'){doRegisterFinal();}
  else{showProfList();}
}

function showProfList(){
  var profs=Object.values(DB.users()).filter(function(u){return u.role==='prof'&&u.status!=='banned';});
  var sel=document.getElementById('profSelect');
  if(!sel) return;

  // Vider et repeupler le select
  sel.innerHTML='<option value="">-- Choisissez un professeur --</option>';
  if(!profs.length){
    sel.innerHTML='<option value="" disabled>Aucun professeur inscrit pour le moment</option>';
  } else {
    profs.forEach(function(p){
      var opt=document.createElement('option');
      opt.value=p.id;
      // Afficher : Prénom Nom — Établissement
      var label=(p.name||'Professeur');
      if(p.conservatoire) label+=' — '+p.conservatoire;
      opt.textContent=label;
      opt.dataset.name=p.name||'';
      opt.dataset.etab=p.conservatoire||'';
      sel.appendChild(opt);
    });
  }

  // Listener changement de sélection
  sel.onchange=function(){
    var info=document.getElementById('profSelectInfo');
    var nameEl=document.getElementById('profSelectName');
    var etabEl=document.getElementById('profSelectEtab');
    var selected=sel.options[sel.selectedIndex];
    if(sel.value&&selected){
      _selectedProfId=sel.value;
      if(nameEl) nameEl.textContent=selected.dataset.name||'';
      if(etabEl) etabEl.textContent=selected.dataset.etab?'🏫 '+selected.dataset.etab:'';
      if(info) info.style.display='';
    } else {
      _selectedProfId=null;
      if(info) info.style.display='none';
    }
  };
  // Reset
  sel.value='';
  _selectedProfId=null;
  var info=document.getElementById('profSelectInfo');
  if(info) info.style.display='none';

  document.getElementById('regStep2').style.display='';
}

function doRegisterFinal(){
  var name=(document.getElementById('rName').value||'').trim();
  var email=(document.getElementById('rEmail').value||'').toLowerCase().trim();
  var pw=document.getElementById('rPw').value||'';
  clearAMsg();
  hashPw(pw).then(function(hash){
    var id='u_'+Date.now();
    var nu={id:id,email:email,name:name,role:_regRole,pwHash:hash,createdAt:Date.now(),status:'active',
      instrument:_regRole==='eleve'?(document.getElementById('rInst').value||''):'',
      level:_regRole==='eleve'?(document.getElementById('rLvl').value||''):'',
      conservatoire:_regRole==='prof'?(document.getElementById('rCons').value||'').trim():'',
      classId:_regRole==='prof'?id:(_selectedProfId||''),
      approved:_regRole==='prof'};
    var users=DB.users(); users[id]=nu; DB.saveUsers(users);
    if(_regRole==='eleve'&&_selectedProfId){
      var reqs=DB.requests();
      reqs.push({id:'req_'+Date.now(),eleveId:id,eleveName:name,eleveEmail:email,
        instrument:nu.instrument,level:nu.level,profId:_selectedProfId,status:'pending',createdAt:Date.now()});
      DB.saveRequests(reqs);
      showAOk('Compte créé ! En attente de validation.');
    } else {showAOk('Compte créé !');}
    _authUser=nu;
    sessionStorage.setItem('m8_session',JSON.stringify(nu));
    setTimeout(afterLogin,800);
  });
}

function afterLogin(){
  if(!_authUser) return;
  if(_authUser.role==='admin'){ shS('sAdmin'); renderAdmin(); return; }
  role=_authUser.role; uid=_authUser.id; uname=_authUser.name;
  if(role==='eleve'){
    if(_authUser.classId&&!_authUser.approved){showWaitingApproval();return;}
    var sts=LS.sts();
    if(!sts.find(function(s){return s.id===uid;})){
      sts.push({id:uid,name:uname,instrument:_authUser.instrument||'',level:_authUser.level||'',color:COLS[sts.length%COLS.length]});
      LS.saveSts(sts); LS.saveSd(uid,blank(uid));
    }
  }
  if(role==='prof'){
    var myS=Object.values(DB.users()).filter(function(u){return u.role==='eleve'&&u.classId===uid&&u.approved;});
    var cur=LS.sts();
    myS.forEach(function(u,i){
      if(!cur.find(function(c){return c.id===u.id;})){ cur.push({id:u.id,name:u.name,instrument:u.instrument||'',level:u.level||'',color:COLS[i%COLS.length]}); if(!LS.sd(u.id)) LS.saveSd(u.id,blank(u.id)); }
    });
    var _sts2=myS.map(function(u,i){return {id:u.id,name:u.name,instrument:u.instrument||'',level:u.level||'',color:COLS[i%COLS.length]};});
    LS.saveSts(_sts2); syncStsToFirebase(uid,_sts2);
    pTSid=LS.sts()[0]&&LS.sts()[0].id;
    var pend=DB.requests().filter(function(r){return r.profId===uid&&r.status==='pending';});
    if(pend.length) setTimeout(function(){toast(pend.length+' demande'+(pend.length>1?'s':'')+' en attente');},1000);
  }
  launch();
}

function showWaitingApproval(){
  shS('sA');
  document.getElementById('loginForm').style.display='none';
  document.getElementById('regForm').style.display='none';
  document.getElementById('aSub').textContent='En attente de validation';
  clearAMsg();
  var box=document.querySelector('.abox');
  var old=document.getElementById('waitBox'); if(old) old.remove();
  var wb=document.createElement('div'); wb.id='waitBox';
  var profName='votre professeur';
  if(_authUser&&_authUser.classId){var prof=DB.users()[_authUser.classId]; if(prof) profName=prof.name;}
  wb.innerHTML='<div style="text-align:center;padding:8px 0">'
    +'<div style="font-size:2.4rem;margin-bottom:8px">⏳</div>'
    +'<div style="font-size:.9rem;line-height:1.65;color:var(--text);margin-bottom:12px">Demande envoyée à <b>'+escHtml(profName)+'</b>.<br>Accès confirmé après validation.</div>'
    +'<div class="al ali" style="margin-bottom:12px">Revenez ici après confirmation.</div>'
    +'<button class="btn bp" style="width:100%;justify-content:center;margin-bottom:8px" id="waitRefreshBtn">Vérifier le statut</button>'
    +'<button class="btn bg2" style="width:100%;justify-content:center" onclick="doLogout()">Se déconnecter</button>'
    +'</div>';
  box.appendChild(wb);
  document.getElementById('waitRefreshBtn').addEventListener('click',function(){
    var users=DB.users(); var fresh=users[_authUser.id];
    if(fresh&&fresh.approved){_authUser=fresh; sessionStorage.setItem('m8_session',JSON.stringify(fresh)); wb.remove(); afterLogin();}
    else{toast('Pas encore validé.');}
  });
}

function doLogout(){
  sessionStorage.removeItem('m8_session');
  _authUser=null; role=null; uid=null; uname=null; _curIdx=0; _selectedProfId=null;
  if(_tOn) tunerStop();
  if(mOn) mStop();
  var sb=document.getElementById('dkSidebar'); if(sb) sb.remove();
  shS('sL');
}

function shS(id){
  document.querySelectorAll('.scr').forEach(function(s){ s.classList.remove('on'); s.style.display='none'; });
  var el=document.getElementById(id); if(!el) return;
  el.classList.add('on'); el.style.display='flex';
}

function launch(){
  initDark();
  _curIdx=0;
  buildNavGrid();
  shS('sAp');
  buildDesktopSidebar();
  rPage(role,0);
}

function buildDesktopSidebar(){
  var ap=document.getElementById('sAp'); if(!ap) return;
  var old=document.getElementById('dkSidebar'); if(old) old.remove();
  var w=window.innerWidth, h=window.innerHeight;
  var isIpadLandscape=(w>=769&&w<=1024&&h<w);
  var isDesktop=(w>=1025);
  if(!isDesktop&&!isIpadLandscape) return;
  var sb=document.createElement('div'); sb.id='dkSidebar'; sb.className='desktop-sidebar';
  (TAB_META[role]||[]).forEach(function(m,i){
    var item=document.createElement('div'); item.className='nav-item'+(i===_curIdx?' on':'');
    var w=document.createElement('div'); w.className='nav-ico '+m.col; w.textContent=m.ico;
    var l=document.createElement('div'); l.className='nav-lbl'; l.textContent=m.lbl;
    item.appendChild(w); item.appendChild(l);
    (function(idx){ item.onclick=function(){ _curIdx=idx; buildDesktopSidebar(); rPage(role,idx); }; })(i);
    sb.appendChild(item);
  });
  var body=document.getElementById('apBody')||document.getElementById('sAp');
  var main=document.getElementById('aM');
  if(body) body.insertBefore(sb,body.firstChild);
  else if(main&&main.parentNode) main.parentNode.insertBefore(sb,main);
}

function rPage(r,i){
  _curIdx=i;
  var main=document.getElementById('aM'); main.innerHTML='';
  var p=document.createElement('div'); p.className='pg on'; main.appendChild(p);
  var meta=TAB_META[r];
  if(meta&&meta[i]) document.getElementById('tbPage').textContent=meta[i].ico+' '+meta[i].lbl;
  buildNavGrid();
  var profP=[profClasse,profTaches,buildStats,outilsPage,
    function(el){ msgPageProf(el,pTSid); },fbSyncPage,aidePage];
  var elevP=[eleveDash,sessionGuidee,defisPage,chestsPage,
    avatarPage,weeklyRecapWithHistory,badgesPage,outilsPage,
    function(el){ msgPageEleve(el,uid); },aidePage];
  if(r==='prof'&&profP[i]) profP[i](p);
  else if(r==='eleve'&&elevP[i]) elevP[i](p);
}

function buildNavGrid(){
  var grid=document.getElementById('navGrid'); if(!grid) return;
  var lbl=document.getElementById('navRoleLbl');
  if(lbl) lbl.textContent=role==='prof'?'PROFESSEUR':'ÉLÈVE';
  var meta=TAB_META[role]||[];
  grid.innerHTML='';
  meta.forEach(function(m,i){
    var item=document.createElement('div'); item.className='nav-item'+(i===_curIdx?' on':'');
    var wrap=document.createElement('div'); wrap.className='nav-ico '+m.col;
    wrap.textContent=m.ico;
    var lbl2=document.createElement('div'); lbl2.className='nav-lbl'; lbl2.textContent=m.lbl;
    // Badge messages
    if(m.lbl==='Messages'){
      var sts=LS.sts();
      var total=sts.reduce(function(s,st){ return s+unreadCount(st.id,role); },0);
      if(total>0){
        var b=document.createElement('div'); b.className='nav-badge'; b.style.position='relative'; b.textContent=total;
        wrap.style.position='relative'; wrap.appendChild(b);
      }
    }
    item.appendChild(wrap); item.appendChild(lbl2);
    (function(idx){ item.onclick=function(){ closeNav(); rPage(role,idx); }; })(i);
    grid.appendChild(item);
  });
}

function openNav(){
  var ov=document.getElementById('navOv'); ov.classList.add('on');
  document.getElementById('navBd').onclick=closeNav;
}
function closeNav(){ document.getElementById('navOv').classList.remove('on'); }

function unreadCount(sid, myRole){
  var msgs=getMsgs(sid);
  return msgs.filter(function(m){ return !m.read&&m.from!==myRole; }).length;
}

function profClasse(el){
  var pend=DB.requests().filter(function(r){return r.profId===uid&&r.status==='pending';});
  var sts=LS.sts();
  var all=sts.map(function(st){var d=LS.sd(st.id)||blank(st.id);var s=gStats(d);return {st:st,d:d,s:s,score:getScore(d)};});
  var twm=all.reduce(function(s,x){return s+x.s.wm;},0);
  el.innerHTML='<div style="margin-bottom:14px"><div class="pt">Ma classe</div><div class="ps" style="margin-bottom:0">'+sts.length+' élève'+(sts.length>1?'s':'')+' · '+twm+' min cette semaine</div></div>';
  if(pend.length){
    var pdiv=document.createElement('div');
    pdiv.innerHTML='<div class="ct" style="color:var(--amb)">Demandes ('+ pend.length+')</div>';
    pend.forEach(function(req){
      var card=document.createElement('div'); card.className='req-card req-pending';
      card.innerHTML='<div class="av" style="background:var(--amb);width:36px;height:36px;font-size:.9rem;flex-shrink:0">'+(req.eleveName||'?')[0].toUpperCase()+'</div>'
        +'<div style="flex:1"><div style="font-size:.84rem;font-weight:800">'+escHtml(req.eleveName||'')+'</div>'
        +'<div style="font-size:.68rem;color:var(--muted)">'+escHtml(req.eleveEmail||'')+' · '+escHtml(req.instrument||'')+'</div></div>'
        +'<div style="display:flex;gap:6px">'+'<button class="btn bm bs" data-rid="'+req.id+'" onclick="approveReq(this)">✓</button>'+'<button class="btn bd bs" data-rid="'+req.id+'" onclick="rejectReq(this)">✕</button>'+'</div>';
      pdiv.appendChild(card);
    });
    el.appendChild(pdiv);
    el.insertAdjacentHTML('beforeend','<hr style="margin:10px 0">');
  }
  if(!sts.length){el.insertAdjacentHTML('beforeend','<div class="al ali">Aucun élève dans votre classe.</div>');return;}
  var grid=document.createElement('div'); grid.style.cssText='display:flex;flex-direction:column;gap:6px';
  all.forEach(function(x){
    var st=x.st; var s=x.s; var d=x.d;
    var pct=Math.min(100,Math.round(s.wm/(d.weekGoal||200)*100));
    var col=pct>=100?'var(--mint)':pct>=50?'var(--ind)':'var(--coral)';
    var row=document.createElement('div'); row.className='str';
    row.innerHTML=makeAvatarIcon(st.id,38,st.color,escHtml(st.name[0]))
      +'<div><div class="stn">'+escHtml(st.name)+'</div><div class="stm">'+escHtml(st.instrument||'')+' · '+s.wm+'/'+(d.weekGoal||200)+' min</div>'
      +'<div class="mpb"><div class="mpf" style="width:'+pct+'%;background:'+col+'"></div></div></div>'
      +'<div style="text-align:right"><div style="font-size:.85rem;font-weight:900;color:'+col+'">'+pct+'%</div><div style="font-size:.6rem;color:var(--muted)">'+s.st+'j</div></div>';
    (function(sid){row.onclick=function(){openStudentCard(sid,el);};})(st.id);
    grid.appendChild(row);
  });
  el.appendChild(grid);
}

function approveReq(btn){
  var rid=btn.dataset.rid;
  var reqs=DB.requests(); var users=DB.users();
  var req=reqs.find(function(r){return r.id===rid;}); if(!req) return;
  req.status='approved';
  var eleve=users[req.eleveId]; if(eleve){eleve.classId=uid;eleve.approved=true;}
  DB.saveRequests(reqs); DB.saveUsers(users);
  var sts=LS.sts();
  if(!sts.find(function(s){return s.id===req.eleveId;})){
    sts.push({id:req.eleveId,name:req.eleveName,instrument:req.instrument||'',level:req.level||'',color:COLS[sts.length%COLS.length]});
    LS.saveSts(sts); syncStsToFirebase(uid,sts); LS.saveSd(req.eleveId,blank(req.eleveId)); syncToFirebase(req.eleveId,blank(req.eleveId));
  }
  toast('✅ '+req.eleveName+' ajouté(e) !'); confetti();
  profClasse(document.querySelector('.pg.on'));
}

function rejectReq(btn){
  var rid=btn.dataset.rid;
  var reqs=DB.requests(); var req=reqs.find(function(r){return r.id===rid;}); if(!req) return;
  req.status='rejected';
  var users=DB.users(); if(users[req.eleveId]) users[req.eleveId].classId='';
  DB.saveRequests(reqs); DB.saveUsers(users);
  toast('Refusé.'); profClasse(document.querySelector('.pg.on'));
}

function openStudentCard(sid,parentEl){
  var st=LS.sts().find(function(s){ return s.id===sid; }); if(!st) return;
  var d=LS.sd(sid)||blank(sid); var s=gStats(d);
  var wh=wHist(d.sessions||{},6);
  var maxW=Math.max.apply(null,[1].concat(wh));
  var pct=Math.min(100,Math.round(s.wm/(d.weekGoal||200)*100));
  var col=pct>=100?'#2dbd8f':pct>=50?'#5b4fcf':'#f0614a';
  var DAYS=['S6','S5','S4','S3','S2','S1'];

  var _avd=LS.sd(sid)||blank(sid);
  var html='<div style="display:flex;justify-content:center;margin-bottom:12px">'+buildAvatarSVG(getAvatarConfig(_avd),200)+'</div>';
  html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'
    +'<div class="av" style="background:'+st.color+';width:44px;height:44px;font-size:1.1rem">'+escHtml(st.name[0])+'</div>'
    +'<div><div style="font-size:1rem;font-weight:800">'+escHtml(st.name)+'</div>'
    +'<div style="font-size:.72rem;color:var(--muted)">'+escHtml(st.instrument||'')+' · '+escHtml(st.level||'')+'</div></div>'
    +'<button onclick="cMo()" style="margin-left:auto;background:transparent;border:none;font-size:1.2rem;cursor:pointer;color:var(--muted)">✕</button>'
    +'</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:16px;text-align:center">'
    +'<div class="sc" style="flex:1"><div class="scl">Total</div><div class="scv">'+Math.round(s.tm/60*10)/10+'h</div></div>'
    +'<div class="sc" style="flex:1"><div class="scl">Semaine</div><div class="scv" style="color:'+col+'">'+pct+'%</div></div>'
    +'<div class="sc" style="flex:1"><div class="scl">Série</div><div class="scv">'+s.st+'j</div></div>'
    +'</div>'
    +'<div class="ct">6 dernières semaines</div>'
    +'<div style="display:flex;align-items:flex-end;gap:4px;height:64px;margin-bottom:4px">';
  wh.forEach(function(m,i){
    var h=maxW>0?Math.max(4,Math.round(m/maxW*58)):4;
    html+='<div class="day-chip">'
      +'<div class="day-chip-bar" style="height:'+h+'px"></div>'
      +'<div class="day-chip-lbl">'+DAYS[i]+'</div>'
      +'</div>';
  });
  html+='</div>';

  // Dernières sessions
  var sess=d.sessions||{};
  var recent=Object.keys(sess).filter(function(k){ return k.length===10&&sesMins(sess[k])>0; }).sort().reverse().slice(0,5);
  if(recent.length){
    html+='<div class="ct" style="margin-top:10px">Sessions récentes</div>';
    recent.forEach(function(k){
      var raw=sess[k]; var mins=sesMins(raw);
      var entries=(typeof raw==='object'&&raw.entries)||[];
      var timeStr=entries.length&&entries[0].start?entries[0].start+(entries[0].end?' → '+entries[0].end:''):'';
      html+='<div class="hrow" style="gap:8px"><div style="font-size:.82rem;font-weight:700">'+k+'</div>'
        +(timeStr?'<div style="font-size:.7rem;color:var(--ind)">'+timeStr+'</div>':'')
        +'<div class="sp"></div><div style="font-weight:800;color:var(--ind)">'+mins+' min</div></div>';
    });
  }

  var curGoal=d.weekGoal||200;
  html+='<div style="background:var(--indl);border-radius:10px;padding:11px;margin-top:10px">'
    +'<div style="font-size:.68rem;font-weight:800;color:var(--ind);margin-bottom:6px">🎯 Objectif semaine</div>'
    +'<div style="display:flex;gap:8px;align-items:center">'
    +'<input type="number" id="goalInput" value="'+curGoal+'" min="30" max="600" step="10"'
    +' style="width:80px;padding:6px 8px;border:1.5px solid var(--indm);border-radius:8px;font-size:.85rem;font-weight:800;text-align:center">'
    +'<span style="font-size:.75rem;color:var(--muted)">min / semaine</span>'
    +'<button class="btn bp bs" style="margin-left:auto" onclick="saveStudentGoal(\''+sid+'\',parseInt(document.getElementById(\'goalInput\').value))">Sauver</button>'
    +'</div></div>';
  html+='<div style="display:flex;gap:8px;margin-top:10px">'
    +'<button class="btn bg2 bs" onclick="pTSid=\''+sid+'\';cMo();rPage(\'prof\',4)">💬 Message</button>'
    +'<button class="btn bp bs" onclick="cMo()">Fermer</button></div>';

  sMo(html);
  pTSid=sid;
}
function saveStudentGoal(sid, mins){
  if(!mins||mins<30||mins>600){ toast('Objectif invalide (30-600 min)'); return; }
  var d=LS.sd(sid)||blank(sid);
  d.weekGoal=mins;
  LS.saveSd(sid,d);
  if(fbDb) try{ fbDb.ref('data/'+sid).set(d); }catch(e){}
  toast('Objectif : '+mins+' min/semaine ✓');
  cMo();
}

  });

    });
    html+='</div></div>';
  });

  html+='</div>';
  el.innerHTML=html;
}

// Wrapper HTML pour remplacer .av par un avatar SVG
function makeAvatarIcon(sid, size, fallbackColor, fallbackLetter){
  size = size || 38;
  var d = LS.sd(sid);
  if(d && d.avatarConfig){
    return '<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid var(--indm)">'+buildAvatarHead(d.avatarConfig,size)+'</div>';
  }
  // Fallback initiale
  return '<div class="av" style="background:'+fallbackColor+';width:'+size+'px;height:'+size+'px;font-size:'+(size*0.4)+'px;flex-shrink:0">'+fallbackLetter+'</div>';
}


function getAvatarConfig(d){
  var c=d.avatarConfig||{};
  return {skin:c.skin||'s1',hair:c.hair||'h1',outfit:c.outfit||'o1',accessory:c.accessory||'a0',instrument:c.instrument||'i1',scene:c.scene||'sc1'};
}

function saveAvatarConfig(d,cfg){
  d.avatarConfig=cfg; LS.saveSd(uid,d);
  if(fbDb) try{fbDb.ref('data/'+uid+'/avatarConfig').set(cfg);}catch(e){}
}

function getUnlockedItems(d){
  var xp=getXP(d);
  var u={skins:['s1'],hairs:['h1'],outfits:['o1'],accessories:['a0'],instruments:['i1'],scenes:['sc1']};
  var cats=['skins','hairs','outfits','accessories','instruments','scenes'];
  cats.forEach(function(cat){
    AVATAR_ITEMS[cat].forEach(function(item){
      if(item.unlock==='default') return;
      var thr=item.unlock==='common'?150:item.unlock==='rare'?400:800;
      if(xp>=thr && u[cat].indexOf(item.id)<0) u[cat].push(item.id);
    });
  });
  (d.chestHistory||[]).forEach(function(r){
    if(r.unlockedItem){var cat=r.unlockedItem.cat,id=r.unlockedItem.id;if(u[cat]&&u[cat].indexOf(id)<0)u[cat].push(id);}
  });
  return u;
}


function renderAvatarInEl(containerId, cfg, size){
  var el=document.getElementById(containerId); if(!el) return;
  el.innerHTML=buildAvatarSVG(cfg, size||280);
}

function selectAvatarItem(cat,cfgKey,itemId){
  if(!uid) return;
  var d=LS.sd(uid)||blank(uid);
  var unlocked=getUnlockedItems(d);
  if(unlocked[cat].indexOf(itemId)<0){toast('🔒 Gagnez des XP pour débloquer !');return;}
  var cfg=getAvatarConfig(d);
  cfg[cfgKey]=itemId;
  saveAvatarConfig(d,cfg);
  // Mettre à jour la preview sans recharger toute la page
  var prev=document.getElementById('avatarPreview');

function gsToggle(){
  if(gsOn){
    clearInterval(gsT); gsOn=false;
    var bt=document.getElementById('gsBt'); if(bt) bt.textContent='▶ Reprendre';
  } else {
    if(!_gsStart) _gsStart=nowHHMM();
    gsOn=true;
    var bt=document.getElementById('gsBt'); if(bt) bt.textContent='⏸ Pause';
    gsT=setInterval(function(){ gsSec++; gsUpd(); }, 1000);
  }
}

function gsUpd(){
  var h=Math.floor(gsSec/3600), m=Math.floor((gsSec%3600)/60), s=gsSec%60;
  var el=document.getElementById('gsD'); if(el) el.textContent=p2(h)+':'+p2(m)+':'+p2(s);
}

function gsStop(){
  clearInterval(gsT); gsOn=false;
  var mins=Math.floor(gsSec/60);
  if(mins>0){
    var d=LS.sd(uid)||blank(uid);
    var et=nowHHMM(); var st=_gsStart||'';
    sesWrite(d, tday(), mins, st, et);
    LS.saveSd(uid,d);
    if(typeof fbWrite==='function'&&fbDb) fbWrite('data/'+uid,d);
    toast('✓ '+mins+' min'+(st?' ('+st+' → '+et+')':''));
    updateSpBar();
  }
  gsSec=0; _gsStart=null;
  var bt=document.getElementById('gsBt'); if(bt) bt.textContent='Démarrer';
  gsUpd();
  var st2=document.getElementById('gsSt'); if(st2) st2.textContent='Terminé ! Bon travail 🎉';
  if(typeof mStop==='function') mStop();
}

function addManT(){
  var mins=parseInt((document.getElementById('manMin')||{value:'0'}).value)||0;
  if(mins<1) return;
  if(!uid){ toast('Non connecté'); return; }
  var dk=tday();
  var dv=(document.getElementById('manDate')||{}).value;
  if(dv&&dv.length===10) dk=dv;
  var startT=((document.getElementById('manTime')||{}).value)||'';
  var endT='';
  if(startT){
    var pp=startT.split(':'); var d2=new Date();
    d2.setHours(parseInt(pp[0]),parseInt(pp[1])+mins,0);
    endT=p2(d2.getHours())+':'+p2(d2.getMinutes());
  }
  var d=LS.sd(uid)||blank(uid);
  sesWrite(d, dk, mins, startT, endT);
  LS.saveSd(uid,d);
  if(typeof fbWrite==='function'&&fbDb) fbWrite('data/'+uid,d);
  var s2=gStats(d); var goal=d.weekGoal||200;
  var pct=Math.min(100,Math.round(s2.wm/goal*100));
  toast('✓ '+mins+' min · Semaine: '+s2.wm+'/'+goal+' min ('+pct+'%)');
  updateSpBar();
}

function openChest(pageEl){
  var d=LS.sd(uid)||blank(uid); var xp=getXP(d);
  var earned=Math.floor(xp/150); var opened=d.chestsOpened||0;
  if(opened>=earned){ toast('Aucun coffre disponible'); return; }
  // Pool dynamique : items avatar non débloqués + récompenses classiques
  var _unlocked=getUnlockedItems(d);
  var _avCats=['skins','hairs','outfits','accessories','instruments','scenes'];
  var _avCfgKeys={skins:'skin',hairs:'hair',outfits:'outfit',accessories:'accessory',instruments:'instrument',scenes:'scene'};
  var _avIcos={skins:'🎨',hairs:'💇',outfits:'👕',accessories:'✨',instruments:'🎼',scenes:'🎭'};
  var _avPool=[];
  _avCats.forEach(function(cat){
    AVATAR_ITEMS[cat].forEach(function(item){
      if(item.unlock==='default') return;
      if(_unlocked[cat].indexOf(item.id)>=0) return;
      var r2=item.unlock==='legendary'?'l':item.unlock==='rare'?'r':'c';
      _avPool.push({ico:_avIcos[cat],txt:'Avatar : '+item.name,rarity:r2,unlockedItem:{cat:cat,cfgKey:_avCfgKeys[cat],id:item.id}});
    });
  });
  var _classic=[
    {ico:'🎯',txt:'Objectif +10 min',      rarity:'c'},
    {ico:'⚡',     txt:'Bonus XP x2',           rarity:'r'},
    {ico:'💡',txt:'Conseil du maestro',     rarity:'c'},
    {ico:'🔥',txt:'Série protégée',       rarity:'r'},
    {ico:'🎁',txt:'Surprise légendaire',  rarity:'l'}
  ];
  var REWARDS=(_avPool.length?_avPool:[]).concat(_classic);

  var weights={c:0.62,r:0.28,l:0.10};
  var rnd=Math.random(); var chosen=REWARDS[0];
  var pool=[];
  REWARDS.forEach(function(r){ if(Math.random()<weights[r.rarity]) pool.push(r); });
  if(!pool.length) pool=REWARDS;
  chosen=pool[Math.floor(Math.random()*pool.length)];
  d.chestsOpened=(d.chestsOpened||0)+1;
  d.chestHistory=d.chestHistory||[];
  var _histEntry={ico:chosen.ico,txt:chosen.txt,rarity:chosen.rarity,ts:Date.now()};
  if(chosen.unlockedItem) _histEntry.unlockedItem=chosen.unlockedItem;
  d.chestHistory.push(_histEntry);
  // Appliquer automatiquement le déblocage avatar
  if(chosen.unlockedItem){
    var _cfg=getAvatarConfig(d);
    _cfg[chosen.unlockedItem.cfgKey]=chosen.unlockedItem.id;
    d.avatarConfig=_cfg;
  }
  LS.saveSd(uid,d);
  confetti();
  var RC={c:'#5b4fcf',r:'#f5a623',l:'#f0614a'};
  var RN={c:'Commune',r:'Rare',l:'Legendaire'};
  sMo('<div style="text-align:center;padding:8px 0">'
    +'<div style="font-size:3.5rem;display:inline-block;animation:bounce .5s ease infinite alternate">'+chosen.ico+'</div>'
    +'<div style="font-family:Lora,serif;font-size:1.3rem;font-weight:600;color:var(--text);margin:10px 0 4px">'+escHtml(chosen.txt)+'</div>'
    +'<div style="display:inline-block;padding:3px 12px;border-radius:20px;font-size:.72rem;font-weight:800;background:'+RC[chosen.rarity||'c']+';color:white;margin-bottom:16px">'+RN[chosen.rarity||'c']+'</div>'
    +'<div><button class="btn bp" style="justify-content:center;width:100%" id="chestOkBtn">Super !</button></div>'
    +'</div>');
  document.getElementById('chestOkBtn').addEventListener('click',function(){
    cMo();
    if(pageEl) chestsPage(pageEl);
  });
  toast(chosen.ico+' '+chosen.txt+' !');
}

function getMsgs(sid){ try{ return JSON.parse(localStorage.getItem(MSG_KEY+sid)||'[]'); }catch(e){ return []; } }
function saveMsgs(sid,msgs){ localStorage.setItem(MSG_KEY+sid, JSON.stringify(msgs)); }

function sendMsg(sid, text, fromRole, attachment){
  if(!text||!text.trim()) return;
  var msgs=getMsgs(sid);
  var msg={text:text.trim(), from:fromRole, time:Date.now(), read:false};
  if(attachment) msg.attachment=attachment;
  msgs.push(msg);
  saveMsgs(sid,msgs);
}

function markRead(sid, myRole){
  var msgs=getMsgs(sid);
  msgs.forEach(function(m){ if(m.from!==myRole) m.read=true; });
  saveMsgs(sid,msgs);
}

function renderMsgThread(msgs, myRole){
  if(!msgs.length) return '<div style="text-align:center;font-size:.75rem;color:var(--muted);padding:16px 0">Aucun message</div>';
  return msgs.map(function(m){
    var isMe=m.from===myRole;
    var dt=new Date(m.time);
    var time=p2(dt.getHours())+':'+p2(dt.getMinutes());
    var readTick=isMe?('<span class="msg-read-tick'+(m.read?' read':'')+'">'+( m.read?'✓✓':'✓')+'</span>'):'';
    var audioHtml='';
    if(m.attachment&&m.attachment.type==='audio'){
      audioHtml='<div style="margin-top:5px"><audio controls src="'+m.attachment.dataUrl+'" style="width:100%;max-width:220px;height:30px"></audio>'
        +'<div style="font-size:.6rem;opacity:.7">🎙 '+Math.floor(m.attachment.duration||0)+'s</div></div>';
    }
    return '<div style="display:flex;flex-direction:column;align-items:'+(isMe?'flex-end':'flex-start')+'">'
      +'<div class="msg-bubble '+(isMe?'msg-from-me':'msg-from-prof')+'">'+escHtml(m.text)+audioHtml+'</div>'
      +'<div class="msg-meta">'+time+readTick+'</div>'
      +'</div>';
  }).join('');
}

function scrollMsgThread(){
  setTimeout(function(){
    var t=document.getElementById('msgThread');
    if(t) t.scrollTop=t.scrollHeight;
  },50);
}

function doSendMsg(sid, myRole){
  var inp=document.getElementById('msgInput'); if(!inp) return;
  var text=inp.value.trim(); if(!text) return;
  sendMsg(sid, text, myRole);
  inp.value=''; inp.style.height='';
  var thread=document.getElementById('msgThread');
  if(thread){ thread.innerHTML=renderMsgThread(getMsgs(sid),myRole); scrollMsgThread(); }
  buildNavGrid();
}

function bindMsgInputs(sid, myRole){
  var inp=document.getElementById('msgInput');
  var btn=document.getElementById('msgSendBtn');
  if(inp){
    inp.addEventListener('keydown',function(e){
      if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); e.stopPropagation(); doSendMsg(sid,myRole); }
    });
    inp.addEventListener('input',function(){
      this.style.height=''; this.style.height=Math.min(this.scrollHeight,100)+'px';
    });
  }
  if(btn) btn.addEventListener('click',function(e){ e.preventDefault(); doSendMsg(sid,myRole); });
  var ab=document.getElementById('msgAudioBtn');
  if(ab) ab.addEventListener('click',function(e){ e.preventDefault(); openProfRecorder(sid); });
}

function msgPage(el, sid, myRole){
  if(myRole==='prof') msgPageProf(el,sid);
  else msgPageEleve(el,sid);
}

function msgPageEleve(el, sid){

function msgPageProf(el, selectedSid){
  var sts=LS.sts();
  if(!sts.length){ el.innerHTML='<div class="pt">Messagerie</div><div class="al ali">Aucun élève.</div>'; return; }
  if(!selectedSid) selectedSid=sts[0].id;

  el.innerHTML='';
  el.insertAdjacentHTML('beforeend','<div style="margin-bottom:14px"><div class="pt">Messagerie</div><div class="ps" style="margin-bottom:0">Vos élèves</div></div>');

  // Inbox
  var inbox=document.createElement('div'); inbox.style.marginBottom='12px';
  sts.forEach(function(st){
    var unread=unreadCount(st.id,'prof');
    var msgs2=getMsgs(st.id); var last=msgs2.length?msgs2[msgs2.length-1]:null;
    var preview=last?(last.from==='prof'?'Vous : ':'')+escHtml(last.attachment?'🎙 Audio':last.text):'Aucun message';
    var item=document.createElement('div');
    item.className='msg-inbox-item'+(st.id===selectedSid?' has-unread':unread>0?' has-unread':'');
    item.innerHTML=makeAvatarIcon(st.id,32,st.color,escHtml(st.name[0]))
      +'<div style="flex:1;min-width:0"><div style="font-size:.82rem;font-weight:800">'+escHtml(st.name)+'</div>'
      +'<div class="msg-inbox-preview">'+preview+'</div></div>'
      +(unread>0?'<div class="nav-badge" style="position:relative;top:0;right:0">'+unread+'</div>':'');
    (function(sid){ item.onclick=function(){ pTSid=sid; msgPageProf(el,sid); }; })(st.id);
    inbox.appendChild(item);
  });
  el.appendChild(inbox);

  var selSt=sts.find(function(s){return s.id===selectedSid;})||sts[0];
  el.insertAdjacentHTML('beforeend','<div class="sl" style="margin-bottom:7px">Conversation avec '+escHtml(selSt.name)+'</div>');

  var card=document.createElement('div'); card.className='card';
  var thread=document.createElement('div'); thread.id='msgThread'; thread.className='msg-thread';
  thread.innerHTML=renderMsgThread(getMsgs(selectedSid),'prof');

  var inputRow=document.createElement('div'); inputRow.className='msg-input-row';
  inputRow.innerHTML='<button id="msgAudioBtn" type="button" style="padding:0 8px;border:none;background:transparent;font-size:1.1rem;cursor:pointer;color:var(--ind);flex-shrink:0">🎙</button>'
    +'<textarea id="msgInput" class="msg-input" placeholder="Ecrire a '+escHtml(selSt.name)+'..." rows="1"></textarea>'
    +'<button class="msg-send" id="msgSendBtn" type="button">&#10148;</button>';

  var recZone=document.createElement('div'); recZone.id='profRecZone'; recZone.style.display='none';
  card.appendChild(thread); card.appendChild(inputRow); card.appendChild(recZone);
  el.appendChild(card);
  scrollMsgThread();
  bindMsgInputs(selectedSid,'prof');
}

function buildRecorder(el){
  var MAX=300;
  var _rec=null,_stream=null,_chunks=[],_timer=null,_elapsed=0,_blob=null,_objUrl=null;

  el.innerHTML='<div class="tcard">'
    +'<div class="ttitle">&#127897; Enregistreur</div>'
    +'<div class="tsub">Jusqu\'a 5 min \u2014 envoie au professeur</div>'
    +'<div class="rec-wave-wrap"><canvas id="rcWave" width="600" height="50"></canvas>'
    +'<div id="rcTime" class="rec-time-disp">0:00</div></div>'
    +'<div class="rec-prog-track"><div id="rcProg" class="rec-prog-fill"></div></div>'
    +'<div style="display:flex;gap:8px;justify-content:center;margin-bottom:10px">'
    +'<button id="rcBtn" type="button" style="padding:9px 22px;border-radius:20px;border:none;background:var(--ind);color:white;font-family:Nunito,sans-serif;font-size:.88rem;font-weight:800;cursor:pointer">&#9210; Enregistrer</button>'
    +'<button id="rcStop" type="button" style="display:none;padding:9px 18px;border-radius:20px;border:none;background:var(--corall);color:var(--coral);font-family:Nunito,sans-serif;font-size:.85rem;font-weight:800;cursor:pointer">&#9632; Terminer</button>'
    +'</div>'
    +'<div id="rcRes" style="display:none;background:var(--indl);border-radius:10px;padding:12px;margin-bottom:8px">'
    +'<div style="font-size:.72rem;font-weight:800;color:var(--ind);margin-bottom:8px">&#10003; Pr\u00eat \u00e0 \u00e9couter</div>'
    +'<audio id="rcPlayer" controls style="width:100%;margin-bottom:8px" playsinline></audio>'
    +'<div style="display:flex;gap:6px">'
    +'<input id="rcMsg" placeholder="Message (optionnel)..." style="flex:1;padding:6px 9px;border:1.5px solid var(--indm);border-radius:8px;font-size:.78rem;font-family:Nunito,sans-serif">'
    +'<button id="rcSend" type="button" style="padding:7px 12px;border-radius:8px;border:none;background:var(--mint);color:white;font-family:Nunito,sans-serif;font-size:.76rem;font-weight:800;cursor:pointer;white-space:nowrap">Envoyer</button>'
    +'</div></div>'
    +'<button id="rcReset" type="button" style="display:none;width:100%;padding:7px;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:Nunito,sans-serif;font-size:.73rem;cursor:pointer">&#128260; Nouveau</button>'
    +'<div id="rcStat" style="text-align:center;font-size:.7rem;color:var(--muted);margin-top:6px">Appuie pour commencer</div>'
    +'</div>';

  function stopAll(){
    if(_timer){clearInterval(_timer);_timer=null;}
    if(_rec&&_rec.state!=='inactive') try{_rec.stop();}catch(e){}
    if(_stream) _stream.getTracks().forEach(function(t){try{t.stop();}catch(e){}});
    _stream=null;
  }

  function drawWave(analyser){
    var cv=document.getElementById('rcWave'); if(!cv) return;
    var cx=cv.getContext('2d'); if(!cx) return;
    var buf=new Uint8Array(analyser.frequencyBinCount);
    (function frame(){
      if(!_rec||_rec.state==='inactive') return;
      requestAnimationFrame(frame);
      analyser.getByteTimeDomainData(buf);
      cx.fillStyle='#080810'; cx.fillRect(0,0,cv.width,cv.height);
      cx.strokeStyle='#5b4fcf'; cx.lineWidth=2; cx.beginPath();
      var sl=cv.width/buf.length;
      for(var i=0;i<buf.length;i++){
        var y=(buf[i]/128-1)*(cv.height/2)+cv.height/2;
        i?cx.lineTo(i*sl,y):cx.moveTo(0,y);
      }
      cx.stroke();
    })();
  }

  document.getElementById('rcBtn').addEventListener('click',function(){
    // Pause/Reprendre
    if(_rec&&_rec.state==='recording'){

    }
    if(_rec&&_rec.state==='paused'){
      _rec.resume(); this.textContent='\u23f8 Pause'; return;
    }

    // SAFARI iOS : créer AudioContext ICI dans le clic, avant tout async
    var actx;
    try{ actx=new(window.AudioContext||window.webkitAudioContext)(); }
    catch(e){ toast('Audio non disponible'); return; }

    var constraints={audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}};
    navigator.mediaDevices.getUserMedia(constraints).then(function(stream){
      _stream=stream; _chunks=[]; _elapsed=0;

      // Waveform
      var src=actx.createMediaStreamSource(stream);
      var an=actx.createAnalyser(); an.fftSize=256; src.connect(an);
      drawWave(an);

      // Choisir le meilleur format
      var mimeType='audio/webm';
      if(typeof MediaRecorder!=='undefined'&&MediaRecorder.isTypeSupported){
        if(MediaRecorder.isTypeSupported('audio/mp4')) mimeType='audio/mp4';
        else if(MediaRecorder.isTypeSupported('audio/webm')) mimeType='audio/webm';
        else if(MediaRecorder.isTypeSupported('audio/ogg')) mimeType='audio/ogg';
      }

      try{ _rec=new MediaRecorder(stream,{mimeType:mimeType}); }
      catch(e){ _rec=new MediaRecorder(stream); }

      _rec.ondataavailable=function(e){ if(e.data&&e.data.size>0) _chunks.push(e.data); };
      _rec.onstop=function(){
        _blob=new Blob(_chunks,{type:_rec.mimeType||mimeType});
        // Révoquer l'ancienne URL si elle existe
        if(_objUrl) URL.revokeObjectURL(_objUrl);
        _objUrl=URL.createObjectURL(_blob);

      document.getElementById('rcBtn').textContent='\u23f8 Pause';
      document.getElementById('rcStop').style.display='';

var mTapTimes=[];
function mTap(){
  var now=Date.now();
  mTapTimes=mTapTimes.filter(function(t){return now-t<3000;});
  mTapTimes.push(now);
  if(mTapTimes.length>=2){
    var gaps=[];
    for(var i=1;i<mTapTimes.length;i++) gaps.push(mTapTimes[i]-mTapTimes[i-1]);
    var avg=gaps.reduce(function(s,g){return s+g;},0)/gaps.length;
    mBpmSet(Math.round(60000/avg));
  }
}

function mBpmSet(v){
  mBpm=Math.max(20,Math.min(240,v));
  var d=document.getElementById('mBpmDisp'); if(d) d.textContent=mBpm;
  var s=document.getElementById('mSlider'); if(s) s.value=mBpm;
  var n=document.getElementById('mTempoName'); if(n) n.textContent=getTempoWord(mBpm);
  if(mOn){clearInterval(mTimer);mTimer=setInterval(mDo,Math.round(60000/mBpm));}
}

function mSigSet(s){
  mSig=s; mBeat=0;
  ['ms2','ms3','ms4','ms6'].forEach(function(id){
    var el=document.getElementById(id); if(el) el.classList.remove('on');
  });
  var btn=document.getElementById('ms'+s); if(btn) btn.classList.add('on');
  mInitBeats();
}

function mInitBeats(){
  var row=document.getElementById('mBeatsRow'); if(!row) return;
  row.innerHTML='';
  for(var i=0;i<mSig;i++){
    var b=document.createElement('div'); b.className='mbeat'+(i===0?' first':''); b.id='mb'+i;
    row.appendChild(b);
  }
}

function mToggle(){
  if(mOn) mStop(); else mStart();
}

function mStart(){
  if(!mACtx) try{mACtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  if(mACtx&&mACtx.state==='suspended') mACtx.resume();
  mOn=true; mBeat=0;
  var btn=document.getElementById('mPlayBtn'); if(btn){btn.textContent='⏹ Stop';btn.classList.add('on');}
  mTimer=setInterval(mDo, Math.round(60000/mBpm));
}

function mStop(){
  clearInterval(mTimer); mOn=false;
  for(var i=0;i<mSig;i++){ var b=document.getElementById('mb'+i); if(b) b.classList.remove('on'); }
  var btn=document.getElementById('mPlayBtn'); if(btn){btn.textContent='▶ Start';btn.classList.remove('on');}
}

function mDo(){
  for(var i=0;i<mSig;i++){ var b=document.getElementById('mb'+i); if(b) b.classList.remove('on'); }
  var cur=document.getElementById('mb'+mBeat); if(cur) cur.classList.add('on');
  if(mACtx){
    try{
      var t=mACtx.currentTime;
      var isAccent=(mBeat===0);
      var snd=mSound;
      if(snd==='click'){
        var bufLen=Math.floor(mACtx.sampleRate*0.07);
        var buf=mACtx.createBuffer(1,bufLen,mACtx.sampleRate);
        var data=buf.getChannelData(0);
        for(var k=0;k<bufLen;k++) data[k]=(Math.random()*2-1)*Math.exp(-k/(mACtx.sampleRate*0.011));
        var src=mACtx.createBufferSource();src.buffer=buf;
        var flt=mACtx.createBiquadFilter();flt.type='highpass';flt.frequency.value=isAccent?1400:900;
        var g=mACtx.createGain();g.gain.value=isAccent?3.5:2.2;
        src.connect(flt);flt.connect(g);g.connect(mACtx.destination);
        src.start(t);
      } else if(snd==='wood'){
        var o=mACtx.createOscillator(),g2=mACtx.createGain();
        o.type='sine';o.frequency.setValueAtTime(isAccent?950:620,t);
        o.frequency.exponentialRampToValueAtTime(isAccent?220:160,t+0.055);
        g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(isAccent?2.8:1.8,t+0.003);
        g2.gain.exponentialRampToValueAtTime(0.001,t+0.09);
        o.connect(g2);g2.connect(mACtx.destination);o.start(t);o.stop(t+0.12);
      } else if(snd==='bell'){
        var freqs=isAccent?[880,1760,2640,3520]:[523,1046,1569];
        var vols=isAccent?[2.4,1.2,0.5,0.25]:[1.6,0.8,0.3];
        var dur=isAccent?0.9:0.5;
        for(var n=0;n<freqs.length;n++){
          var o3=mACtx.createOscillator(),g3=mACtx.createGain();
          o3.type='sine';o3.frequency.value=freqs[n];
          g3.gain.setValueAtTime(0,t);g3.gain.linearRampToValueAtTime(vols[n],t+0.004);
          g3.gain.exponentialRampToValueAtTime(0.001,t+dur);
          o3.connect(g3);g3.connect(mACtx.destination);o3.start(t);o3.stop(t+dur+0.1);
        }
      } else {
        var o4=mACtx.createOscillator(),g4=mACtx.createGain();
        o4.type='square';o4.frequency.value=isAccent?1400:900;
        g4.gain.setValueAtTime(0,t);g4.gain.linearRampToValueAtTime(isAccent?0.7:0.4,t+0.002);
        g4.gain.exponentialRampToValueAtTime(0.001,t+(isAccent?0.09:0.06));
        o4.connect(g4);g4.connect(mACtx.destination);o4.start(t);o4.stop(t+0.12);
      }
    }catch(e){}
  }
  // Arc progress
  var arc=document.getElementById('mArcC');
  if(arc){var actx2=arc.getContext('2d');if(actx2){actx2.clearRect(0,0,arc.width,arc.height);actx2.fillStyle=isAccent?'#ff6b9d':'rgba(155,111,232,.8)';actx2.fillRect(0,0,arc.width*(mBeat+1)/mSig,arc.height);}}
  mBeat=(mBeat+1)%mSig;
}

function getTempoWord(bpm){
  if(bpm<60)  return 'Largo';
  if(bpm<66)  return 'Larghetto';
  if(bpm<76)  return 'Adagio';
  if(bpm<108) return 'Andante';
  if(bpm<120) return 'Moderato';
  if(bpm<156) return 'Allegro';
  if(bpm<176) return 'Vivace';
  if(bpm<200) return 'Presto';
  return 'Prestissimo';
}

      self.textContent = '🎤 Activer';
      self.disabled = false;
      var st = document.getElementById('tStat');
      if(st) st.textContent = 'Audio non disponible';
      return;
    }

    // Resume immédiatement (Safari exige ça dans le tap)
    var startTuner = function(){
      navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl:  false,
          channelCount: 1
        },
        video: false
      }).then(function(stream){
        _tACtx    = actx;
        _tStream  = stream;
        _tAnalyser = actx.createAnalyser();
        _tAnalyser.fftSize = 4096;
        _tAnalyser.smoothingTimeConstant = 0.5;
        var src = actx.createMediaStreamSource(stream);
        src.connect(_tAnalyser);
        _tOn = true;
        _tLastFreq = 0;
        _tSilenceCount = 0;
        self.textContent = '⏹ Arrêter';
        self.disabled = false;
        self.classList.add('on');
        var st = document.getElementById('tStat');
        if(st){ st.textContent = 'En écoute...'; st.style.color = 'rgba(255,255,255,.5)'; }
        _tRAF = requestAnimationFrame(tunerTick);
      }).catch(function(e){
        try{ actx.close(); }catch(ex){}
        self.textContent = '🎤 Activer';
        self.disabled = false;
        var st = document.getElementById('tStat');
        if(st) st.textContent = 'Micro refusé : ' + e.message;
        toast('Autorisez le micro dans les réglages Safari');
      });
    };

    if(actx.state === 'suspended'){
      actx.resume().then(startTuner).catch(startTuner);
    } else {
      startTuner();
    }
  });
}

function tunerStart(){
  if(!_tACtx){
    try{ _tACtx=new(window.AudioContext||window.webkitAudioContext)(); }
    catch(e){ toast('Audio non disponible'); return; }
  }
  navigator.mediaDevices.getUserMedia({audio:true,video:false})
    .then(function(stream){
      var go=function(){
        _tStream=stream;
        _tAnalyser=_tACtx.createAnalyser(); _tAnalyser.fftSize=4096; _tAnalyser.smoothingTimeConstant=0.5;
        var src=_tACtx.createMediaStreamSource(stream); src.connect(_tAnalyser);

    })

      toast('Micro : '+e.message);

}

function tunerStop(){
  _tOn=false;
  if(_tRAF){cancelAnimationFrame(_tRAF);_tRAF=0;}
  if(_tStream){_tStream.getTracks().forEach(function(t){try{t.stop();}catch(e){}});_tStream=null;}
  if(_tACtx){try{_tACtx.close();}catch(e){} _tACtx=null;}
  _tLastFreq=0; _tSilenceCount=0;
  var btn=document.getElementById('tBtn');
  if(btn){btn.textContent='&#127908; Activer';btn.classList.remove('on');}
  var n=document.getElementById('tNoteMain');
