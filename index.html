function tunerTick(){
  if(!_tOn || !_tAnalyser || !_tACtx) return;
  var bufSize = _tAnalyser.fftSize;
  var buf = new Float32Array(bufSize);
  _tAnalyser.getFloatTimeDomainData(buf);
  var freq = autoCorr(buf, _tACtx.sampleRate);

  if(freq > 20 && freq < 5000){
    // Lissage exponentiel pour éviter le scintillement
    _tLastFreq = _tLastFreq ? _tLastFreq * 0.85 + freq * 0.15 : freq;
    var f2 = _tLastFreq * Math.pow(2, _tTranspose / 12);
    var res = freqToNote(f2);
    var c = Math.round(res.cents);
    var inTune = Math.abs(c) < 5;
    var close  = Math.abs(c) < 15;
    var col = inTune ? '#34d399' : close ? '#fbbf24' : '#f87171';

    var n = document.getElementById('tNoteMain');
    if(n){ n.textContent = res.note; n.style.color = col; }
    var fd = document.getElementById('tFreqDisp');
    if(fd) fd.textContent = _tLastFreq.toFixed(1) + ' Hz';
    var st = document.getElementById('tStat');
    if(st){ st.textContent = inTune ? 'EN ACCORD ✓' : close ? 'PROCHE...' : 'DÉSACCORDÉ'; st.style.color = col; }
    tDrawGauge(c, col);
  } else {
    // Silence / bruit — ne pas effacer trop vite
    _tSilenceCount = (_tSilenceCount || 0) + 1;
    if(_tSilenceCount > 20){
      _tLastFreq = 0;
      var n2 = document.getElementById('tNoteMain');
      if(n2){ n2.textContent = '--'; n2.style.color = 'rgba(255,255,255,.2)'; }
      var st2 = document.getElementById('tStat');
      if(st2){ st2.textContent = 'En écoute...'; st2.style.color = 'rgba(255,255,255,.3)'; }
      tDrawGauge(0, 'rgba(255,255,255,.1)');
    }
  }
  if(freq > 20) _tSilenceCount = 0;
  _tRAF = requestAnimationFrame(tunerTick);
}

function tDrawGauge(cents,col){
  var cv=document.getElementById('tGauge'); if(!cv) return;
  var ctx=cv.getContext('2d'); if(!ctx) return;
  ctx.clearRect(0,0,cv.width,cv.height);
  var w=cv.width,h=cv.height,cx=w/2,cy=h;
  var r=h-8; var range=50;
  ctx.strokeStyle='rgba(255,255,255,.08)'; ctx.lineWidth=6; ctx.beginPath();
  ctx.arc(cx,cy,r,-Math.PI,0); ctx.stroke();
  var angle=-Math.PI+(Math.max(-range,Math.min(range,cents))+range)/(range*2)*Math.PI;
  ctx.strokeStyle=col; ctx.lineWidth=4; ctx.beginPath();
  ctx.arc(cx,cy,r,angle-0.05,angle+0.05); ctx.stroke();
  // Center line
  ctx.strokeStyle='rgba(255,255,255,.2)'; ctx.lineWidth=2; ctx.beginPath();
  ctx.moveTo(cx,cy-r+10); ctx.lineTo(cx,cy-r+24); ctx.stroke();
  // Needle
  var nx=cx+r*Math.cos(angle), ny=cy+r*Math.sin(angle);
  ctx.strokeStyle=col; ctx.lineWidth=3; ctx.beginPath();
  ctx.moveTo(cx,cy); ctx.lineTo(nx,ny); ctx.stroke();
  ctx.fillStyle=col; ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2); ctx.fill();
}

function autoCorr(buf, sr){
  // Algorithme YIN — référence pour instruments à vent
  var bufSize = buf.length;
  var halfSize = Math.floor(bufSize / 2);

  // Calcul RMS — seuil très bas pour capter la flûte
  var rms = 0;
  for(var i = 0; i < bufSize; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / bufSize);
  if(rms < 0.003) return -1; // Seuil bas pour instruments doux

  // Étape 1 : différence
  var d = new Float32Array(halfSize);
  for(var tau = 0; tau < halfSize; tau++){
    for(var j = 0; j < halfSize; j++){
      var delta = buf[j] - buf[j + tau];
      d[tau] += delta * delta;
    }
  }

  // Étape 2 : différence cumulée normalisée
  var dn = new Float32Array(halfSize);
  dn[0] = 1;
  var cumsum = 0;
  for(var tau2 = 1; tau2 < halfSize; tau2++){
    cumsum += d[tau2];
    dn[tau2] = d[tau2] * tau2 / (cumsum || 1);
  }

  // Étape 3 : trouver le premier minimum absolu < seuil
  var threshold = 0.15; // Seuil YIN standard
  var tau3 = 2;
  while(tau3 < halfSize){
    if(dn[tau3] < threshold){
      // Chercher le minimum local
      while(tau3 + 1 < halfSize && dn[tau3 + 1] < dn[tau3]) tau3++;
      break;
    }
    tau3++;
  }
  if(tau3 === halfSize || dn[tau3] >= 0.5) return -1;

  // Étape 4 : interpolation parabolique pour précision sub-sample
  var betterTau = tau3;
  if(tau3 > 0 && tau3 < halfSize - 1){
    var s0 = dn[tau3 - 1], s1 = dn[tau3], s2 = dn[tau3 + 1];
    betterTau = tau3 + (s2 - s0) / (2 * (2 * s1 - s2 - s0) || 1);
  }

  return sr / betterTau;
}

function freqToNote(freq){
  var NOTES=['La','La#','Si','Do','Do#','Re','Re#','Mi','Fa','Fa#','Sol','Sol#'];
  var n=12*(Math.log(freq/_tA4)/Math.log(2));n=Math.round(n)+69;
  var note=NOTES[(n-21+120)%12]; var oct=Math.floor((n-12)/12);
  var ideal=_tA4*Math.pow(2,(n-69)/12);
  return {note:note+oct, cents:1200*Math.log(freq/ideal)/Math.log(2)};
}

function tSetA4(v){
  _tA4=Math.max(415,Math.min(465,v));
  var el=document.getElementById('tA4Val'); if(el) el.textContent=_tA4+' Hz';
}

function tPlayRef(freq, btn){
  // Créer un contexte temporaire si nécessaire (clic direct = OK Safari)
  var ctx=_tACtx;
  if(!ctx){
    try{ ctx=new(window.AudioContext||window.webkitAudioContext)(); }
    catch(e){ return; }
  }
  if(ctx.state==='suspended') ctx.resume();
  var o=ctx.createOscillator(), g=ctx.createGain();
  o.frequency.value=freq; o.type='sine';
  g.gain.setValueAtTime(0,ctx.currentTime);
  g.gain.linearRampToValueAtTime(0.4,ctx.currentTime+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.5);
  o.connect(g); g.connect(ctx.destination);
  o.start(); o.stop(ctx.currentTime+1.6);
  document.querySelectorAll('.tstr').forEach(function(el){el.classList.remove('active');});
  if(btn) btn.classList.add('active');
  setTimeout(function(){if(btn)btn.classList.remove('active');},1700);
}

function buildPomodoro(el){
  var WORK=25*60, SHORT=5*60, LONG=15*60;
  function getGoal(){ return pomPhase==='work'?WORK:pomCycle%4===0?LONG:SHORT; }
  function render(){
    var goal=getGoal(); var pct=1-pomSec/goal; var circ=2*Math.PI*55;
    var col=pomPhase==='work'?'#5b4fcf':'#2dbd8f';
    var m=Math.floor(pomSec/60),s=pomSec%60;
    el.innerHTML='<div class="tcard" style="text-align:center">'
      +'<div class="ttitle">⏱ Pomodoro</div>'
      +'<div class="tsub">'+(pomPhase==='work'?'Travail • Cycle '+(pomCycle+1):'Pause')+'</div>'
      +'<div class="rw" style="justify-content:center;margin:16px 0">'
      +'<svg width="130" height="130"><circle cx="65" cy="65" r="55" stroke="var(--border)" stroke-width="8" fill="none"/>'
      +'<circle cx="65" cy="65" r="55" stroke="'+col+'" stroke-width="8" fill="none" stroke-dasharray="'+circ+'" stroke-dashoffset="'+(circ*pct)+'" stroke-linecap="round" transform="rotate(-90 65 65)"/></svg>'
      +'<div class="rc"><div class="pom-time" style="color:'+col+'">'+p2(m)+':'+p2(s)+'</div>'
      +'<div class="pom-ph" style="color:var(--muted)">'+(pomPhase==='work'?'TRAVAIL':'PAUSE')+'</div></div>'
      +'</div>'
      +'<div class="row" style="justify-content:center;gap:8px">'
      +'<button class="btn bp" id="pomBtn" onclick="pomToggle()">'+( pomOn?'⏸ Pause':'▶ Démarrer')+'</button>'
      +'<button class="btn bg2" onclick="pomReset()">↺</button>'
      +'</div></div>';
  }
  window.pomToggle=function(){
    pomOn=!pomOn;
    if(pomOn) pomT=setInterval(function(){
      pomSec--;
      if(pomSec<=0){
        pomOn=false; clearInterval(pomT);
        if(pomPhase==='work'){ pomCycle++; pomPhase='pause'; pomSec=pomCycle%4===0?LONG:SHORT; }
        else { pomPhase='work'; pomSec=WORK; }
        toast(pomPhase==='work'?'Pause terminée ! Au travail.':'Pause ! Bien mérité.');
      }
      render();
    },1000);
    else clearInterval(pomT);
    render();
  };
  window.pomReset=function(){ pomOn=false; clearInterval(pomT); pomSec=WORK; pomPhase='work'; render(); };
  pomSec=WORK; pomPhase='work';
  render();
}

function fbSyncNow(){
  if(!fbDb){ toast('Firebase non connect\u00e9'); return; }
  // Sync toutes les donn\u00e9es des \u00e9l\u00e8ves
  var sts=LS.sts(); var count=0;
  sts.forEach(function(st){
    var d=LS.sd(st.id);

}

    if(res) res.innerHTML=
      '<div class="al ali" style="flex-direction:column;gap:10px">'

      +'<button class="btn bp bs" onclick="saveGKey()">Sauver</button>'
      +'</div>'
      +'<div style="font-size:.68rem;color:var(--muted)">Cr\u00e9ez une cl\u00e9 sur aistudio.google.com</div>'
      +'</div>';
    return;
  }
  var d=LS.sd(uid)||blank(uid); var s=gStats(d);
  var st=LS.sts().find(function(x){return x.id===uid;})||{};
  var instr=st.instrument||(_authUser&&_authUser.instrument)||'musique';
  var lvl=st.level||(_authUser&&_authUser.level)||'';
  var btn=document.getElementById('exoBtn');
  if(btn){btn.disabled=true;btn.textContent='G\u00e9n\u00e9ration...';}
  var res2=document.getElementById('exoResult');
  if(res2) res2.innerHTML='<div style="color:var(--muted);font-size:.78rem;padding:8px 0">\u23f3 Analyse...</div>';
  var prompt='Tu es professeur de conservatoire expert en '+instr+'.'
    +(lvl?' L\u2019\u00e9l\u00e8ve est en '+lvl+'.':'')
    +' Il a pratiqu\u00e9 '+s.tm+' minutes au total, '+s.wm+' min cette semaine.'
    +' Propose 1 exercice concret de 10-15 min. 3-4 phrases, sans titres.';
  var body=JSON.stringify({contents:[{parts:[{text:prompt}]}]});
  var url='https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+k;
  fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:body})
    .then(function(r){
      return r.json().then(function(data){
        return {ok:r.ok, status:r.status, data:data};
      });
    })
    .then(function(result){
      if(!result.ok){
        var msg=result.data&&result.data.error&&result.data.error.message||'Erreur '+result.status;
        throw new Error(msg);
      }
      var text='';
      try{text=result.data.candidates[0].content.parts[0].text;}catch(e){}
      if(!text) throw new Error('R\u00e9ponse vide');
      var r2=document.getElementById('exoResult');
      if(r2) r2.innerHTML=
        '<div style="background:var(--indl);border:1.5px solid var(--indm);border-radius:12px;padding:14px;font-size:.85rem;line-height:1.75">'+escHtml(text.trim())+'</div>'
        +'<div style="text-align:right;margin-top:6px">'
        +'<button class="btn bg2 bs" onclick="genExo()">\u21ba Autre</button>'
        +'<button class="btn bg2 bs" style="margin-left:6px" onclick="localStorage.removeItem(\'m_gkey\');genExo()">\uD83D\uDD11 Cl\u00e9</button>'
        +'</div>';
      var b2=document.getElementById('exoBtn');
      if(b2){b2.disabled=false;b2.textContent='Nouvel exercice';}
    })
    .catch(function(e){
      var r3=document.getElementById('exoResult');
      // Afficher l'erreur EXACTE pour diagnostiquer
      if(r3) r3.innerHTML=
        '<div class="al alw" style="flex-direction:column;gap:6px">'
        +'<div style="font-weight:700">Erreur : '+escHtml(e.message)+'</div>'
        +'<button class="btn bg2 bs" onclick="localStorage.removeItem(\'m_gkey\');genExo()">\u21ba Changer la cl\u00e9</button>'
        +'</div>';
      var b3=document.getElementById('exoBtn');
      if(b3){b3.disabled=false;b3.textContent='R\u00e9essayer';}
    });
}

function weeklyRecapWithHistory(el){
  var d=LS.sd(uid)||blank(uid); var s=gStats(d);
  var goal=d.weekGoal||200;
  var pct=Math.min(100,Math.round(s.wm/goal*100));
  var col=pct>=100?'var(--mint)':pct>=50?'var(--ind)':'var(--coral)';

  el.innerHTML='<div style="margin-bottom:14px"><div class="pt">Résumé & Historique</div>'
    +'<div class="ps" style="margin-bottom:0">Votre progression et vos sessions</div></div>';

  // ── Résumé semaine ──

    '<div class="card" style="margin-bottom:12px">'
    +'<div class="ct">Cette semaine</div>'
    +'<div style="display:flex;align-items:center;gap:16px;padding:8px 0">'
    +'<div style="text-align:center;flex-shrink:0">'
    +'<svg width="80" height="80" viewBox="0 0 80 80">'
    +'<circle cx="40" cy="40" r="34" fill="none" stroke="var(--border)" stroke-width="7"/>'
    +'<circle cx="40" cy="40" r="34" fill="none" stroke="'+col+'" stroke-width="7"'
    +' stroke-dasharray="213.6" stroke-dashoffset="'+(213.6-213.6*pct/100)+'"'
    +' stroke-linecap="round" transform="rotate(-90 40 40)"/>'
    +'<text x="40" y="36" text-anchor="middle" font-size="14" font-weight="900" fill="'+col+'">'+pct+'%</text>'
    +'<text x="40" y="50" text-anchor="middle" font-size="8" fill="var(--muted)">semaine</text>'
    +'</svg></div>'
    +'<div style="flex:1">'
    +'<div style="font-size:.78rem;color:var(--muted);margin-bottom:4px">'+s.wm+' / '+goal+' min</div>'
    +'<div style="font-size:.78rem;color:var(--muted);margin-bottom:4px">'+s.st+' jour'+(s.st>1?'s':'')+' de suite</div>'
    +'<div style="font-size:.78rem;color:var(--muted)">'+s.tm+' min au total</div>'
    +'</div></div></div>'
  );

  // ── Heatmap 7 derniers jours ──
  var today=new Date(); today.setHours(0,0,0,0);
  var days=[]; var maxM=1;
  for(var di=6;di>=0;di--){
    var dt=new Date(today.getTime()-di*86400000);
    var k=dt.toISOString().slice(0,10);
    var raw=d.sessions&&d.sessions[k];
    var mins=raw?(typeof raw==='object'?raw.total:raw):0;
    if(mins>maxM) maxM=mins;
    days.push({k:k,m:mins,label:['D','L','M','M','J','V','S'][dt.getDay()]});
  }
  var heatHtml='<div class="card" style="margin-bottom:12px"><div class="ct">7 derniers jours</div>'
    +'<div style="display:flex;gap:6px;align-items:flex-end;height:60px;margin-top:8px">';
  days.forEach(function(day){
    var h=Math.max(6,Math.round(day.m/maxM*50));
    var isToday=day.k===today.toISOString().slice(0,10);
    var barCol=day.m>0?'var(--ind)':'var(--border)';
    heatHtml+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">'
      +'<div style="font-size:.58rem;color:var(--muted)">'+day.m+'</div>'
      +'<div style="width:100%;height:'+h+'px;background:'+barCol+';border-radius:4px 4px 0 0;'+(isToday?'box-shadow:0 0 8px var(--indm)':'')+'"></div>'
      +'<div style="font-size:.6rem;font-weight:'+(isToday?900:600)+';color:'+(isToday?'var(--ind)':'var(--muted)')+'">'+day.label+'</div>'
      +'</div>';
  });
  heatHtml+='</div></div>';
  el.insertAdjacentHTML('beforeend', heatHtml);

  // ── Historique des sessions ──
  var sessions=d.sessions||{};
  var entries=Object.keys(sessions).map(function(k){
    var v=sessions[k];
    return {k:k, mins:typeof v==='object'?v.total:v};
  }).filter(function(e){ return e.mins>0; })
    .sort(function(a,b){ return b.k.localeCompare(a.k); })
    .slice(0,20);

  el.insertAdjacentHTML('beforeend',
    '<div class="card"><div class="ct">Historique des sessions</div>'
    +(entries.length?'':'<div style="font-size:.8rem;color:var(--muted);padding:8px 0">Aucune session enregistrée.</div>')
  );
  entries.forEach(function(e){
    var dt=new Date(e.k);
    var label=dt.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
    var pct2=Math.min(100,Math.round(e.mins/goal*100));
    var col2=pct2>=100?'var(--mint)':pct2>=50?'var(--ind)':'var(--coral)';
    el.querySelector('.card:last-child').insertAdjacentHTML('beforeend',
      '<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)">'
      +'<div style="font-size:.75rem;font-weight:700;color:var(--text);width:90px;flex-shrink:0">'+label+'</div>'

  _setSyncDot('busy');
  var done = 0;
  function onDone() {
    done++;
    if (done >= 2) {
      _setSyncDot('ok');
      if (callback) callback();

  // Auth
  fbDb.ref('auth').once('value', function(snap) {
    var data = snap.val();

      if (data.users)    localStorage.setItem('m8_auth_users',    JSON.stringify(data.users));
      if (data.requests) localStorage.setItem('m8_auth_requests', JSON.stringify(data.requests));
    }
    onDone();
  }, function() { onDone(); });
  // Données élèves — Firebase est source de vérité
  fbDb.ref('data').once('value', function(snap) {
    var data = snap.val();
    if (data) {
      Object.keys(data).forEach(function(sid) {
        var remote = data[sid];
        if (!remote) return;
        var local = LS.sd(sid);

        LS.saveSd(sid, merged);

  }, function() { onDone(); });
};

<script>
/* ══════════════════════════════════════════════════════════════
   MAESTRO v24c — FIX LECTURE AUDIO iOS/Safari
   Coller juste avant </body>, après les patches v24 et v24b
   ══════════════════════════════════════════════════════════════ */

// Détecte le bon mimeType pour Safari iOS
function _getBestMimeType() {
  if (typeof MediaRecorder === 'undefined') return '';
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
              (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  if (isIOS) return 'audio/mp4';
  if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) return 'audio/webm;codecs=opus';
  if (MediaRecorder.isTypeSupported('audio/webm')) return 'audio/webm';
  if (MediaRecorder.isTypeSupported('audio/mp4')) return 'audio/mp4';
  return '';
}

// Crée un élément audio qui fonctionne partout
function _makeAudioEl(dataUrl) {
  var audio = document.createElement('audio');
  audio.controls = true;
  audio.style.cssText = 'width:100%;margin-bottom:8px';
  audio.setAttribute('playsinline', '');
  audio.setAttribute('preload', 'metadata');

  // Détecter le type depuis le dataUrl
  var mimeMatch = dataUrl && dataUrl.match(/^data:([^;]+);/);
  var mimeType = mimeMatch ? mimeMatch[1] : '';

  // Créer une source explicite avec le bon type
  var source = document.createElement('source');
  source.src = dataUrl;
  if (mimeType) source.type = mimeType;
  audio.appendChild(source);

  // Fallback : src direct aussi
  audio.src = dataUrl;

  return audio;
}

// Patch renderMsgThread pour utiliser _makeAudioEl
function renderMsgThread(msgs, myRole) {
  if (!msgs.length) return '<div style="text-align:center;font-size:.75rem;color:var(--muted);padding:16px 0">Aucun message</div>';
  return msgs.map(function(m) {
    var isMe = m.from === myRole;
    var dt = new Date(m.time);
    var time = p2(dt.getHours()) + ':' + p2(dt.getMinutes());
    var readTick = isMe ? ('<span class="msg-read-tick' + (m.read ? ' read' : '') + '">' + (m.read ? '✓✓' : '✓') + '</span>') : '';
    var audioHtml = '';
    if (m.attachment && m.attachment.type === 'audio' && m.attachment.dataUrl) {
      // Créer un id unique pour injecter l'audio après
      var audioId = 'aud_' + m.time;
      audioHtml = '<div style="margin-top:5px" id="' + audioId + '_wrap">'
        + '<div style="font-size:.62rem;color:rgba(255,255,255,.5);margin-bottom:3px">🎙 ' + Math.floor(m.attachment.duration || 0) + 's</div>'
        + '<div id="' + audioId + '"></div>'
        + '</div>';
    }
    return '<div style="display:flex;flex-direction:column;align-items:' + (isMe ? 'flex-end' : 'flex-start') + '">'
      + '<div class="msg-bubble ' + (isMe ? 'msg-from-me' : 'msg-from-prof') + '">'
      + escHtml(m.text) + audioHtml + '</div>'
      + '<div class="msg-meta">' + time + readTick + '</div>'
      + '</div>';
  }).join('');
}

// Après avoir rendu le thread, injecter les vrais éléments audio
function _injectAudioPlayers(msgs) {
  msgs.forEach(function(m) {
    if (!m.attachment || m.attachment.type !== 'audio' || !m.attachment.dataUrl) return;
    var audioId = 'aud_' + m.time;
    var container = document.getElementById(audioId);
    if (!container) return;
    container.innerHTML = '';
    var audioEl = _makeAudioEl(m.attachment.dataUrl);
    container.appendChild(audioEl);
  });
}

// Patch scrollMsgThread pour injecter les players après rendu
var _origScrollMsgThread = scrollMsgThread;
scrollMsgThread = function() {
  _origScrollMsgThread();
  // Injecter les players audio dans tous les threads visibles
  setTimeout(function() {
    var sts2 = LS.sts();
    sts2.forEach(function(st) {
      var msgs = getMsgs(st.id);
      _injectAudioPlayers(msgs);
    });
    // Aussi pour l'élève connecté
    if (uid) _injectAudioPlayers(getMsgs(uid));
  }, 50);
};

// Patch buildRecorder — fix le player après enregistrement
var _origBuildRecorder = buildRecorder;
buildRecorder = function(el) {
  _origBuildRecorder(el);

  // Intercepter le onstop pour recréer le player correctement
  var rcStop = document.getElementById('rcStop');
  if (rcStop) {
    var origClick = rcStop.onclick;
    rcStop.addEventListener('click', function() {
      setTimeout(function() {
        var pl = document.getElementById('rcPlayer');
        var res = document.getElementById('rcRes');
        if (!pl || !res || res.style.display === 'none') return;
        // Le src a été défini par l'original — on recrée juste la source
        var currentSrc = pl.src;
        if (!currentSrc) return;
        pl.load(); // forcer Safari à charger
        pl.onerror = function() {
          // Si erreur, essayer sans type forcé
          pl.removeAttribute('type');
          pl.src = currentSrc;
          pl.load();
        };
      }, 200);
    });
  }
};

// Fix pour l'enregistreur dans la messagerie prof
// Patch openProfRecorder — fix player
var _origOpenProfRecorder = openProfRecorder;
openProfRecorder = function(sid) {
  _origOpenProfRecorder(sid);
  setTimeout(function() {
    var prPlayer = document.getElementById('prPlayer');
    if (!prPlayer) return;
    prPlayer.onerror = function() {
      var src = prPlayer.src || prPlayer.currentSrc;
      if (src) { prPlayer.src = ''; prPlayer.src = src; prPlayer.load(); }
    };
  }, 300);
};

// ══ VISAGE — TOUTES LES EXPRESSIONS GÉRÉES PROPREMENT ══
function svgFace(id,sk,hc,ec,expr,isMale){
  var o='';

  // ── Positions de base ──
  var eyY=HCY+5;       // ligne des yeux
  var eyLX=CX-17;      // centre œil gauche
  var eyRX=CX+17;      // centre œil droit
  var eW=12, eH=13;    // taille œil
  var browY=eyY-eH-5;  // sourcils
  var noseY=HCY+24;    // nez
  var mouthY=HCY+38;   // bouche
  var browC=dk(hc.c,5); // couleur sourcils

  if(expr==='ex5'){ eyY-=3; browY-=3; } // Surpris — yeux remontés

  // ── SOURCILS (communs à toutes expressions sauf ex2) ──
  if(expr!=='ex2'){
    if(expr==='ex3'){ // Sérieux — droits, légèrement froncés
      o+='<line x1="'+(eyLX-eW)+'" y1="'+browY+'" x2="'+(eyLX+eW)+'" y2="'+browY+'" stroke="'+browC+'" stroke-width="3" stroke-linecap="round"/>';
      o+='<line x1="'+(eyRX-eW)+'" y1="'+browY+'" x2="'+(eyRX+eW)+'" y2="'+browY+'" stroke="'+browC+'" stroke-width="3" stroke-linecap="round"/>';
    } else if(expr==='ex5'){ // Surpris — très relevés et arqués
      o+='<path d="M'+(eyLX-eW)+' '+(browY-8)+' Q'+eyLX+' '+(browY-16)+' '+(eyLX+eW)+' '+(browY-8)+'" stroke="'+browC+'" stroke-width="3" fill="none" stroke-linecap="round"/>';
      o+='<path d="M'+(eyRX-eW)+' '+(browY-8)+' Q'+eyRX+' '+(browY-16)+' '+(eyRX+eW)+' '+(browY-8)+'" stroke="'+browC+'" stroke-width="3" fill="none" stroke-linecap="round"/>';
    } else { // Normal / Clin d'œil — arqués naturellement
      o+='<path d="M'+(eyLX-eW)+' '+(browY+2)+' Q'+eyLX+' '+(browY-7)+' '+(eyLX+eW)+' '+(browY+2)+'" stroke="'+browC+'" stroke-width="3" fill="none" stroke-linecap="round"/>';
      o+='<path d="M'+(eyRX-eW)+' '+(browY+2)+' Q'+eyRX+' '+(browY-7)+' '+(eyRX+eW)+' '+(browY+2)+'" stroke="'+browC+'" stroke-width="3" fill="none" stroke-linecap="round"/>';
    }
  }

  // ── YEUX selon expression ──
  if(expr==='ex2'){ // Joyeux — yeux fermés en croissant + joues relevées + sourcils joyeux
    // Sourcils joyeux
    o+='<path d="M'+(eyLX-eW)+' '+(browY+2)+' Q'+eyLX+' '+(browY-8)+' '+(eyLX+eW)+' '+(browY+2)+'" stroke="'+browC+'" stroke-width="3" fill="none" stroke-linecap="round"/>';
    o+='<path d="M'+(eyRX-eW)+' '+(browY+2)+' Q'+eyRX+' '+(browY-8)+' '+(eyRX+eW)+' '+(browY+2)+'" stroke="'+browC+'" stroke-width="3" fill="none" stroke-linecap="round"/>';
    // Yeux fermés courbés — arc vers le bas
    o+='<path d="M'+(eyLX-eW)+' '+eyY+' Q'+eyLX+' '+(eyY+eH*.7)+' '+(eyLX+eW)+' '+eyY+'" stroke="'+dk(hc.c,8)+'" stroke-width="3.2" fill="none" stroke-linecap="round"/>';
    o+='<path d="M'+(eyRX-eW)+' '+eyY+' Q'+eyRX+' '+(eyRX+eH*.7)+' '+(eyRX+eW)+' '+eyY+'" stroke="'+dk(hc.c,8)+'" stroke-width="3.2" fill="none" stroke-linecap="round"/>';
    // Petite ligne sous l'œil (joue relevée)
    o+='<path d="M'+(eyLX-6)+' '+(eyY+eH*.6)+' Q'+eyLX+' '+(eyY+eH*.8)+' '+(eyLX+6)+' '+(eyY+eH*.6)+'" stroke="#FF8FAA" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>';
    o+='<path d="M'+(eyRX-6)+' '+(eyY+eH*.6)+' Q'+eyRX+' '+(eyY+eH*.8)+' '+(eyRX+6)+' '+(eyY+eH*.6)+'" stroke="#FF8FAA" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>';
  } else if(expr==='ex4'){ // Clin d'œil — œil gauche fermé, droit ouvert
    // Œil droit ouvert normal
    o+=drawOneEye(id,ec,hc,eyRX,eyY,eW,eH);
    // Œil gauche fermé
    o+='<path d="M'+(eyLX-eW)+' '+eyY+' Q'+eyLX+' '+(eyY-eH*.6)+' '+(eyLX+eW)+' '+eyY+'" stroke="'+dk(hc.c,8)+'" stroke-width="3" fill="none" stroke-linecap="round"/>';
    // Cils fermés
    o+='<path d="M'+(eyLX-eW)+' '+eyY+' Q'+eyLX+' '+(eyY-eH)+' '+(eyLX+eW)+' '+eyY+'" stroke="'+dk(hc.c,8)+'" stroke-width="2.5" fill="none" stroke-linecap="round"/>';
  } else if(expr==='ex5'){ // Surpris — yeux très ouverts
    o+=drawOneEye(id,ec,hc,eyLX,eyY,eW+3,eH+4);
    o+=drawOneEye(id,ec,hc,eyRX,eyY,eW+3,eH+4);
  } else { // Normal et Sérieux — yeux standard
    o+=drawOneEye(id,ec,hc,eyLX,eyY,eW,eH);
    o+=drawOneEye(id,ec,hc,eyRX,eyY,eW,eH);
  }

  // Cils (toutes expressions sauf ex2 et ex4 gauche)
  if(expr!=='ex2'){
    if(expr!=='ex4'){
      o+='<path d="M'+(eyLX-eW)+' '+(eyY-eH+3)+' Q'+eyLX+' '+(eyY-eH-4)+' '+(eyLX+eW)+' '+(eyY-eH+3)+'" stroke="'+dk(hc.c,8)+'" stroke-width="2.5" fill="none" stroke-linecap="round"/>';
    }
    o+='<path d="M'+(eyRX-eW)+' '+(eyY-eH+3)+' Q'+eyRX+' '+(eyY-eH-4)+' '+(eyRX+eW)+' '+(eyY-eH+3)+'" stroke="'+dk(hc.c,8)+'" stroke-width="2.5" fill="none" stroke-linecap="round"/>';
  }

  // ── NEZ ──
  o+='<path d="M'+(CX-4)+' '+noseY+' Q'+CX+' '+(noseY+6)+' '+(CX+4)+' '+noseY+'" stroke="'+dk(sk.c,30)+'" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.45"/>';

  // ── BOUCHE selon expression ──
  if(expr==='ex1'||expr==='ex4'){ // Souriant
    o+='<path d="M'+(CX-12)+' '+mouthY+' Q'+CX+' '+(mouthY+9)+' '+(CX+12)+' '+mouthY+'" stroke="#C03060" stroke-width="2.6" fill="none" stroke-linecap="round"/>';
    o+='<path d="M'+(CX-10)+' '+mouthY+' Q'+CX+' '+(mouthY+9)+' '+(CX+10)+' '+mouthY+' Q'+CX+' '+(mouthY+5)+' '+(CX-10)+' '+mouthY+' Z" fill="#E06080" opacity="0.18"/>';
    o+='<path d="M'+(CX-8)+' '+mouthY+' Q'+CX+' '+(mouthY+6)+' '+(CX+8)+' '+mouthY+' Q'+CX+' '+(mouthY+3)+' '+(CX-8)+' '+mouthY+' Z" fill="white" opacity="0.5"/>';
    o+='<circle cx="'+(CX-11)+'" cy="'+(mouthY+1)+'" r="1.8" fill="'+sk.sh+'" opacity="0.2"/>';
    o+='<circle cx="'+(CX+11)+'" cy="'+(mouthY+1)+'" r="1.8" fill="'+sk.sh+'" opacity="0.2"/>';
  } else if(expr==='ex2'){ // Joyeux — grand sourire
    o+='<path d="M'+(CX-15)+' '+(mouthY-2)+' Q'+CX+' '+(mouthY+12)+' '+(CX+15)+' '+(mouthY-2)+'" stroke="#C03060" stroke-width="2.8" fill="none" stroke-linecap="round"/>';
    o+='<path d="M'+(CX-12)+' '+(mouthY-1)+' Q'+CX+' '+(mouthY+11)+' '+(CX+12)+' '+(mouthY-1)+' Q'+CX+' '+(mouthY+6)+' '+(CX-12)+' '+(mouthY-1)+' Z" fill="white" opacity="0.5"/>';
    o+='<path d="M'+(CX-12)+' '+(mouthY-1)+' Q'+CX+' '+(mouthY+12)+' '+(CX+12)+' '+(mouthY-1)+' Q'+CX+' '+(mouthY+5)+' '+(CX-12)+' '+(mouthY-1)+' Z" fill="#E06080" opacity="0.17"/>';
  } else if(expr==='ex3'){ // Sérieux
    o+='<path d="M'+(CX-9)+' '+mouthY+' Q'+CX+' '+(mouthY+2)+' '+(CX+9)+' '+mouthY+'" stroke="#A02848" stroke-width="2" fill="none" stroke-linecap="round"/>';
  } else if(expr==='ex5'){ // Surpris
    o+='<ellipse cx="'+CX+'" cy="'+(mouthY+3)+'" rx="7.5" ry="9.5" fill="#C03060" opacity="0.88"/>';
    o+='<ellipse cx="'+CX+'" cy="'+(mouthY+4)+'" rx="5" ry="7" fill="#180208"/>';
    o+='<ellipse cx="'+CX+'" cy="'+(mouthY+3)+'" rx="7.5" ry="9.5" fill="none" stroke="#8A1830" stroke-width="1.2" opacity="0.45"/>';
  }

  return o;
}

function drawOneEye(id,ec,hc,cx,cy,ew,eh){
  var o='';
  // Blanc
  o+='<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+(ew+1)+'" ry="'+(eh+1)+'" fill="white" filter="url(#FSS'+id+')"/>';
  // Iris
  o+='<ellipse cx="'+cx+'" cy="'+(cy+1)+'" rx="'+ew+'" ry="'+eh+'" fill="url(#EY'+id+')"/>';
  // Pupille
  o+='<ellipse cx="'+(cx+1)+'" cy="'+(cy+1)+'" rx="'+(ew-4)+'" ry="'+(eh-4)+'" fill="#040810"/>';
  // Reflet principal
  o+='<circle cx="'+(cx+4)+'" cy="'+(cy-4)+'" r="4" fill="white" opacity="0.92"/>';
  o+='<circle cx="'+(cx+2)+'" cy="'+(cy-5.5)+'" r="1.6" fill="white"/>';
  // Reflet secondaire petit
  o+='<circle cx="'+(cx-4)+'" cy="'+(cy+4)+'" r="1.8" fill="white" opacity="0.22"/>';
  return o;
}

// buildAvatarSVG(cfg, size)
// cfg utilise les clés de Maestro : skin, hair, accessory, instrument, scene, outfit
// Notre moteur utilise : acc, inst → on fait le mapping ici
function buildAvatarSVG(cfg, size) {
  if (!cfg) cfg = {};
  var c = {
    scene:     cfg.scene                      || 'sc1',
    gender:    cfg.gender                     || 'f',
    skin:      cfg.skin                       || 'sk2',
    hair:      cfg.hair                       || (cfg.gender==='m' ? 'mh1' : 'fh2'),
    hairColor: cfg.hairColor                  || 'hc3',
    eye:       cfg.eye      || cfg.eyeColor   || 'ec1',
    expr:      cfg.expr     || cfg.expression || 'ex1',
    outfit:    cfg.outfit                     || 'ot4',
    // Maestro stocke "accessory", notre moteur veut "acc"
    acc:       cfg.acc      || cfg.accessory  || 'ac0',
    extra:     cfg.extra                      || 'ex0',
    // Maestro stocke "instrument", notre moteur veut "inst"
    inst:      cfg.inst     || cfg.instrument || 'in1',
  };
  var svg = buildSVG(c);
  if (size && size !== 300) {
    var h = Math.round(size * 400 / 300);
    svg = svg.replace('width="300" height="400"', 'width="' + size + '" height="' + h + '"');
  }
  return svg;
}

// getAvatarConfig(d) — valeurs par défaut complètes
// Conserve les clés Maestro (accessory, instrument) pour compatibilité
function getAvatarConfig(d) {
  var def = {
    scene: 'sc1', gender: 'f', skin: 'sk2',
    hair: 'fh2', hairColor: 'hc3', eye: 'ec1',
    expr: 'ex1', outfit: 'ot4',
    accessory: 'ac0', instrument: 'in1', extra: 'ex0'
  };
  if (!d || !d.avatarConfig) return def;
  return Object.assign({}, def, d.avatarConfig);
}

// AVATAR_ITEMS — structure EXACTE attendue par avatarPage() de Maestro
// Chaque item doit avoir : id, name, color (ou bg1+bg2), unlock
var AVATAR_ITEMS = {
  skins: DATA.skins.map(function(s) {
    return { id: s.id, name: s.n || s.id, color: s.c || '#FDDBB4', unlock: 'default' };
  }),
  // hairs = toutes les coiffures fille + garçon mélangées
  // avatarPage utilise cfg['hair'] pour comparer → compatible
  hairs: HAIR_F.concat(HAIR_M).map(function(h) {
    return { id: h.id, name: h.n || h.id, color: '#C88010', unlock: 'default' };
  }),
  outfits: DATA.outfits.map(function(o, i) {
    return { id: o.id, name: o.n || o.id, color: o.m || '#5b4fcf',
             unlock: i === 0 ? 'default' : 'common' };
  }),
  // accessory → cfgKey:'accessory' dans avatarPage
  accessories: DATA.accs.map(function(a, i) {
    return { id: a.id, name: a.n || a.id, color: a.c || '#5b4fcf',
             unlock: i === 0 ? 'default' : 'common' };
  }),
  // instrument → cfgKey:'instrument' dans avatarPage
  instruments: DATA.insts.map(function(it, i) {
    return { id: it.id, name: it.n || it.id, color: it.c || '#C8C8D8',
             unlock: 'default' };
  }),
  scenes: DATA.scenes.map(function(s, i) {
    return { id: s.id, name: s.n || s.id, bg1: s.bg1 || '#050310', bg2: s.bg2 || '#12082E',
             unlock: i === 0 ? 'default' : 'common' };
  }),
};

// selectAvatarItem patch — Maestro appelle cfg[cfgKey] avec 'accessory'/'instrument'
// On s'assure que saveAvatarConfig conserve bien ces clés
var _origSelectAvatarItem = typeof selectAvatarItem === 'function' ? selectAvatarItem : null;
function selectAvatarItem(cat, cfgKey, itemId, pageEl) {
  if (!uid) return;
  var d = LS.sd(uid) || blank(uid);
  var unlocked = getUnlockedItems(d);
  if (unlocked[cat].indexOf(itemId) < 0) { toast('🔒 Gagnez des XP pour débloquer !'); return; }
  var cfg = getAvatarConfig(d);
  cfg[cfgKey] = itemId; // cfgKey = 'accessory' ou 'instrument' → conservé tel quel
  d.avatarConfig = cfg;
  saveAvatarConfig(d, cfg);
  // Mettre à jour le preview
  var preview = document.getElementById('avHeroPreview');
  if (preview) preview.innerHTML = buildAvatarSVG(cfg, 260);
  // Re-render la page pour mettre à jour la sélection
  if (pageEl) avatarPage(pageEl);
}

// makeAvatarIcon(sid, size, color, initial) — remplace l'icône ronde par le vrai avatar
function makeAvatarIcon(sid, size, color, initial) {
  try {
    var d = LS.sd(sid) || {};
    var cfg = getAvatarConfig(d);
    var s = size || 34;
    var h = Math.round(s * 400 / 300);
    var svg = buildSVG({
      scene: cfg.scene, gender: cfg.gender, skin: cfg.skin,
      hair: cfg.hair, hairColor: cfg.hairColor, eye: cfg.eye,
      expr: cfg.expr, outfit: cfg.outfit,
      acc: cfg.acc || cfg.accessory || 'ac0',
      extra: cfg.extra, inst: cfg.inst || cfg.instrument || 'in1'
    }).replace('width="300" height="400"',
      'width="' + s + '" height="' + h + '"');
    return '<div style="width:' + s + 'px;height:' + s + 'px;border-radius:50%;overflow:hidden;flex-shrink:0">' + svg + '</div>';
  } catch(e) {
    // Fallback sur l'icône colorée si erreur
    return '<div class="av" style="background:' + (color||'#5b4fcf') + ';width:' + (size||34) + 'px;height:' + (size||34) + 'px">' + (initial||'?') + '</div>';
  }
}

// _getSceneSpot(cfg) — retourne la couleur d'accent de la scène (utilisée dans avatarPage)
function _getSceneSpot(cfg) {
  var sceneId = cfg && (cfg.scene || 'sc1');
  var sc = DATA.scenes.find(function(s) { return s.id === sceneId; });
  return sc ? sc.ac : '#6858d8';
}

// getUnlockedItems(d) — retourne les items débloqués par catégorie
function getUnlockedItems(d) {
  var xp = getXP(d);
  var hist = d.chestHistory || [];
  var byChest = {};
  hist.forEach(function(h) {
    if (h.unlockedItem) {
      var cat = h.unlockedItem.cat;
      byChest[cat] = byChest[cat] || [];
      byChest[cat].push(h.unlockedItem.id);
    }
  });
  // Tous les items 'default' sont toujours débloqués
  var result = {};
  ['skins','hairs','outfits','accessories','instruments','scenes'].forEach(function(cat) {
    result[cat] = (AVATAR_ITEMS[cat] || [])
      .filter(function(item) { return item.unlock === 'default'; })
      .map(function(item) { return item.id; });
    if (byChest[cat]) result[cat] = result[cat].concat(byChest[cat]);
  });
  return result;
}

console.log('[Maestro] Avatar v6 chargé ✓ — buildAvatarSVG, AVATAR_ITEMS, getAvatarConfig, getUnlockedItems, _getSceneSpot, makeAvatarIcon');
</script>

      if(d.cycles&&d.cycles.length)   PS.cycles=d.cycles;
      if(d.students&&d.students.length)PS.students=d.students;
      if(d.sch)                        PS.sch=d.sch;
      if(d.locked)                     PS.locked=d.locked;
      if(d.workSlots)                  PS.workSlots=d.workSlots;
      if(d.breaks)                     PS.breaks=d.breaks;
    }
    if(cb)cb();
  },function(){if(cb)cb();});
}

// ─── SCHEDULER ────────────────────────────────────────────
function pTeacherOk(day,s,e){
  if(!PS.workSlots.length) return true;
  if(!PS.workSlots.filter(function(w){return w.day===day;}).some(function(w){return pt2m(w.start)<=s&&e<=pt2m(w.end);})) return false;
  return !PS.breaks.filter(function(b){return b.day===day;}).some(function(b){return!(e<=pt2m(b.start)||s>=pt2m(b.end));});
}
function pGenerate(){
  pInit();
  var sch={};PC.DKEYS.forEach(function(d){sch[d]=[];});
  PS.locked.forEach(function(lk){
    var st=PS.students.find(function(s){return s.id===lk.studentId;});
    if(!st)return;
    sch[lk.day].push({studentId:lk.studentId,startMin:lk.startMin,endMin:lk.startMin+st.cycle.duration,locked:true,availType:lk.availType||'preferred'});
  });
  function clash(day,s,e,xid){return sch[day].some(function(sl){return sl.studentId!==xid&&!(e<=sl.startMin||s>=sl.endMin);});}
  var unlocked=PS.students.filter(function(s){return!PS.locked.some(function(l){return l.studentId===s.id;});});
  unlocked.sort(function(a,b){var pa=(b.priority||3)-(a.priority||3);return pa||a.availabilities.length-b.availabilities.length;});
  unlocked.forEach(function(st){
    var placed=false;
    var wins=st.availabilities.filter(function(a){return a.type==='preferred';}).concat(st.availabilities.filter(function(a){return a.type==='possible';}));
    wins.forEach(function(av){
      if(placed)return;
      var ws=pt2m(av.start),we=pt2m(av.end),dur=st.cycle.duration;
      for(var t=ws;t+dur<=we;t+=30){
        if(!pTeacherOk(av.day,t,t+dur))continue;
        if(clash(av.day,t,t+dur,st.id))continue;
        sch[av.day].push({studentId:st.id,startMin:t,endMin:t+dur,locked:false,availType:av.type});
        placed=true;break;
      }
    });
  });
  if(PS.sch) PS.undoStack.push(PS.sch);
  PS.sch=sch;
  var placed2=PC.DKEYS.reduce(function(a,d){return a+(sch[d]||[]).length;},0);
  pSave();
  pFlash(placed2+' élève'+(placed2>1?'s':'')+' placé'+(placed2>1?'s':''));
  pRender();
}

// ─── DRAG & DROP ──────────────────────────────────────────
function pCanDrop(dk,sm,sid){
  var st=PS.students.find(function(s){return s.id===sid;});
  if(!st)return false;
  var dur=st.cycle.duration,em=sm+dur;
  if(sm<PC.START_H*60||em>PC.END_H*60)return false;
  if(!st.availabilities.some(function(a){return a.day===dk&&pt2m(a.start)<=sm&&em<=pt2m(a.end);}))return false;
  if(!pTeacherOk(dk,sm,em))return false;
  return!(PS.sch&&(PS.sch[dk]||[]).filter(function(x){return x.studentId!==sid;}).some(function(x){return!(em<=x.startMin||sm>=x.endMin);}));
}

function pGetDropPos(cx,cy2){
  var app=document.getElementById('planGrid');
  if(!app)return null;
  var r=app.getBoundingClientRect();
  var relX=cx-r.left, relY=cy2-r.top-PC.HEAD_H;
  // Trouver la colonne
  var vci=-1,acc=0;
  for(var i=0;i<_colEls.length;i++){
    var w=_colEls[i]?_colEls[i].getBoundingClientRect().width:0;
    if(relX>=acc&&relX<acc+w){vci=i;break;}
    acc+=w;
  }
  if(vci===-1)return null;
  var grabOff=_drag?_drag.grabOffsetMin:0;
  var rawMin=(relY/PC.ROW_H)*30+PC.START_H*60-grabOff;
  return{dk:PC.DKEYS[vci],sm:psnap(rawMin)};
}

function pOnMouseMove(e){
  if(!_drag)return;
  var cx=e.clientX,cy2=e.clientY;
  if(e.touches&&e.touches[0]){cx=e.touches[0].clientX;cy2=e.touches[0].clientY;}
  var pos=pGetDropPos(cx,cy2);
  var valid=pos?pCanDrop(pos.dk,pos.sm,_drag.sid):false;
  _ghost={x:cx,y:cy2,dk:pos?pos.dk:null,sm:pos?pos.sm:null,valid:valid};
  pUpdateGhostEl();
}

function pOnMouseUp(e){
  if(!_drag)return;
  var cx=e.clientX,cy2=e.clientY;
  if(e.changedTouches&&e.changedTouches[0]){cx=e.changedTouches[0].clientX;cy2=e.changedTouches[0].clientY;}
  var pos=pGetDropPos(cx,cy2);
  if(pos&&pCanDrop(pos.dk,pos.sm,_drag.sid)){
    var sid=_drag.sid,dk=pos.dk,sm=pos.sm,dur=_drag.dur;
    if(PS.sch){
      PS.undoStack.push(JSON.parse(JSON.stringify(PS.sch)));
      // Retirer de l'ancienne position
      PC.DKEYS.forEach(function(d){if(PS.sch[d])PS.sch[d]=PS.sch[d].filter(function(s){return s.studentId!==sid;});});
      var st=PS.students.find(function(s){return s.id===sid;});
      var avType='possible';
      if(st){var av=st.availabilities.find(function(a){return a.day===dk&&pt2m(a.start)<=sm&&sm+dur<=pt2m(a.end);});if(av)avType=av.type;}
      PS.sch[dk]=PS.sch[dk]||[];
      PS.sch[dk].push({studentId:sid,startMin:sm,endMin:sm+dur,locked:false,availType:avType});
      PS.locked=PS.locked.map(function(l){return l.studentId===sid?Object.assign({},l,{day:dk,startMin:sm}):l;});
      pSave();
    }
  }
  _drag=null;_ghost=null;
  var gEl=document.getElementById('planGhostEl');if(gEl)gEl.style.display='none';
  pRenderGrid();
}

function pUpdateGhostEl(){
  var gEl=document.getElementById('planGhostEl');
  if(!gEl)return;
  if(!_ghost){gEl.style.display='none';return;}
  gEl.style.display='block';
  gEl.style.left=(_ghost.x+14)+'px';
  gEl.style.top=(_ghost.y-10)+'px';
  gEl.style.background=_ghost.valid?'#111':'#EF4444';
  gEl.innerHTML='<span style="font-size:.72rem;font-weight:800;color:#fff">'+(_drag?_drag.name.split(' ')[0]:'')+'</span>'
    +'<span style="font-size:.6rem;color:rgba(255,255,255,.7);margin-left:5px">'+(_ghost.valid?'✓':'✗')+'</span>';
}

function pStartDrag(e,slot,slotEl){
  e.stopPropagation();
  if(e.button!==undefined&&e.button!==0)return;
  e.preventDefault();
  var st=PS.students.find(function(s){return s.id===slot.studentId;});
  var cy=st&&(PS.cycles||[]).find(function(c){return st.cycle&&c.id===st.cycle.id;});
  if(!st||!cy)return;
  var cx=e.clientX||(e.touches&&e.touches[0]&&e.touches[0].clientX)||0;
  var cy2=e.clientY||(e.touches&&e.touches[0]&&e.touches[0].clientY)||0;
  var grabPx=slotEl?Math.max(0,cy2-slotEl.getBoundingClientRect().top):0;
  _drag={sid:slot.studentId,dur:cy.duration,color:cy.color,light:cy.light,name:st.name,grabOffsetMin:Math.round(grabPx/PC.ROW_H*30)};
  _ghost={x:cx,y:cy2,dk:null,sm:null,valid:false};
  pUpdateGhostEl();
  // Re-render grille pour montrer le slot en cours (opacité réduite)
  pRenderGrid();
}

// ─── TOAST ────────────────────────────────────────────────
function pFlash(msg){
  var el=document.getElementById('planToast');
  if(!el)return;
  el.textContent=msg;el.style.opacity='1';el.style.display='block';
  clearTimeout(el._t);
  el._t=setTimeout(function(){el.style.opacity='0';setTimeout(function(){el.style.display='none';},300);},2600);
}

// ─── SCORE ────────────────────────────────────────────────
function pScore(){
  if(!PS.sch||!PS.students.length)return{score:0,label:'N/A',color:'#9CA3AF',preferred:0,possible:0,unplaced:0,total:0};
  var pref=0,poss=0,unpl=0;
  PS.students.forEach(function(st){
    var found=false;
    PC.DKEYS.forEach(function(d){var sl=(PS.sch[d]||[]).find(function(s){return s.studentId===st.id;});if(sl){found=true;if(sl.availType==='preferred')pref++;else poss++;}});
    if(!found)unpl++;
  });
  var ws=Math.round((pref*100+poss*60)/PS.students.length);
  var s=Math.min(100,Math.round(ws*.7+(1-unpl/PS.students.length)*30));
  var label=s>=90?'Excellent':s>=75?'Très bon':s>=60?'Bon':s>=40?'Moyen':'À optimiser';
  var color=s>=90?'#00875A':s>=75?'#0066CC':s>=60?'#E17055':s>=40?'#FBBF24':'#E84393';
  return{score:s,label:label,color:color,preferred:pref,possible:poss,unplaced:unpl,total:PS.students.length};
}

function pStats(){
  var sch=PS.sch||{};
  var dayStats=PC.DKEYS.map(function(day,ci){
    var slots=sch[day]||[];
    var cours=slots.reduce(function(a,s){return a+(s.endMin-s.startMin);},0);
    var work=PS.workSlots.filter(function(w){return w.day===day;}).reduce(function(a,w){return a+(pt2m(w.end)-pt2m(w.start));},0);
    var brk=PS.breaks.filter(function(b){return b.day===day;}).reduce(function(a,b){return a+(pt2m(b.end)-pt2m(b.start));},0);
    var avail=Math.max(work-brk,0);
    return{day:day,label:PC.DAYS[ci],cours:cours,avail:avail,count:slots.length,pct:avail>0?Math.round(cours/avail*100):0};
  }).filter(function(d){return d.avail>0||d.count>0;});
  var tc=dayStats.reduce(function(a,d){return a+d.cours;},0);
  var tw=PS.workSlots.reduce(function(a,w){return a+(pt2m(w.end)-pt2m(w.start));},0);
  var tb=PS.breaks.reduce(function(a,b){return a+(pt2m(b.end)-pt2m(b.start));},0);
  return{dayStats:dayStats,totalCours:tc,totalAvail:Math.max(tw-tb,0),pct:tw-tb>0?Math.round(tc/(tw-tb)*100):0};
}

    html+='<div style="height:'+PC.ROW_H+'px;display:flex;align-items:flex-start;justify-content:flex-end;padding-right:5px;padding-top:'+(hi%2===0?4:0)+'px;border-bottom:'+(hi%2===1?'1px solid #F0F1F5':'none')+'">';

    html+='<div class="planCol" data-ci="'+ci+'" data-dk="'+dk+'" style="flex:1;min-width:72px;border-left:'+(ci>0?'1.5px solid #F0F1F5':'none')+';background:'+(ci===5?'#FAFBFC':'#fff')+'">';
    // Header
    html+='<div style="height:'+PC.HEAD_H+'px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-bottom:2px solid #F0F1F5;background:'+(ci===5?'#FAFBFC':'#fff')+'">'

function pAttachGridListeners(){
  _colEls=[];
  var cols=document.querySelectorAll('#planGridCols .planCol');
  cols.forEach(function(el,i){_colEls[i]=el;});

  // Slots : drag + click
  var slots=document.querySelectorAll('.planSlot');
  slots.forEach(function(el){
    var locked=el.getAttribute('data-locked')==='1';
    if(!locked){
      el.addEventListener('mousedown',function(e){if(e.button!==0)return;pStartDrag(e,{studentId:el.getAttribute('data-sid')},el);});
      el.addEventListener('touchstart',function(e){pStartDrag(e,{studentId:el.getAttribute('data-sid')},el);},{passive:false});
    }
    el.addEventListener('click',function(e){
      if(!_drag&&!e.defaultPrevented) pOpenStudentCard(el.getAttribute('data-sid'));
    });
  });

  // Boutons lock
  var lockBtns=document.querySelectorAll('.planLockBtn');
  lockBtns.forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();e.preventDefault();
      pToggleLock(btn.getAttribute('data-day'),btn.getAttribute('data-sid'),parseInt(btn.getAttribute('data-start')));
    });
  });

  // Listeners globaux drag
  window._planMM = pOnMouseMove;
  window._planMU = pOnMouseUp;
  window._planTM = function(e){e.preventDefault();pOnMouseMove(e);};
  window._planTE = pOnMouseUp;
  window.addEventListener('mousemove',window._planMM);
  window.addEventListener('mouseup',window._planMU);
  window.addEventListener('touchmove',window._planTM,{passive:false});
  window.addEventListener('touchend',window._planTE);
}

// Mettre à jour juste la grille sans tout re-render
function pRenderGrid(){
  var wrap=document.getElementById('planGrid');
  if(!wrap)return;
  // Détacher vieux listeners
  if(window._planMM){window.removeEventListener('mousemove',window._planMM);window.removeEventListener('mouseup',window._planMU);window.removeEventListener('touchmove',window._planTM);window.removeEventListener('touchend',window._planTE);}
  wrap.innerHTML=pBuildGrid();
  pAttachGridListeners();
  // In-grid ghost
  pUpdateInGridGhost();
}

function pUpdateInGridGhost(){
  // Supprimer vieux ghosts inline
  document.querySelectorAll('.planInlineGhost').forEach(function(el){el.remove();});
  if(!_ghost||!_ghost.dk||_ghost.sm===null||!_drag)return;
  // Trouver la colonne
  var colEl=null;
  _colEls.forEach(function(el){if(el&&el.getAttribute('data-dk')===_ghost.dk)colEl=el;});
  if(!colEl)return;
  var body=colEl.querySelector('div[style*="position:relative"]');
  if(!body)return;
  var top=pm2px(_ghost.sm);
  var h=(_drag.dur/30)*PC.ROW_H;
  var ghost=document.createElement('div');
  ghost.className='planInlineGhost';
  ghost.style.cssText='position:absolute;top:'+(top+2)+'px;left:3px;right:3px;height:'+(h-4)+'px;z-index:10;border-radius:9px;background:'+(_ghost.valid?_drag.color+'33':'rgba(239,68,68,.15)')+';border:2px dashed '+(_ghost.valid?_drag.color:'#EF4444')+';pointer-events:none;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(1px)';
  ghost.innerHTML='<div style="text-align:center"><div style="font-size:.62rem;font-weight:900;color:'+(_ghost.valid?_drag.color:'#EF4444')+'">'+pesc(_drag.name.split(' ')[0])+'</div><div style="font-size:.5rem;color:'+(_ghost.valid?_drag.color:'#EF4444')+';font-family:monospace;margin-top:1px">'+pm2t(_ghost.sm)+'–'+pm2t(_ghost.sm+_drag.dur)+'</div></div>';
  body.appendChild(ghost);
}

// Override onMouseMove pour aussi updater le ghost inline
var _origMove=pOnMouseMove;
pOnMouseMove=function(e){
  _origMove(e);
  if(_drag) pUpdateInGridGhost();
};

<script id="plan-engine">
// ════════════════════════════════════════════════════════
//  CONSERVATOIRE PLANNING — MOTEUR (vanilla JS)
// ════════════════════════════════════════════════════════
(function(){
'use strict';

// ── CONSTANTS ──────────────────────────────────────────
var PLAN_DEFAULT_CYCLES = [
  {id:'c1',label:'Cycle 1',duration:30,color:'#0066CC',light:'#E8F0FB'},
  {id:'c2',label:'Cycle 2',duration:45,color:'#00875A',light:'#E3F5ED'},
  {id:'c3',label:'CEM',    duration:50,color:'#8B5CF6',light:'#EDE9FE'},
  {id:'c4',label:'COP',    duration:60,color:'#D97706',light:'#FEF3C7'},
  {id:'c5',label:'Perso',  duration:30,color:'#DC2626',light:'#FEE2E2'},
];
var PLAN_DAYS  = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
var PLAN_DKEYS = ['lundi','mardi','mercredi','jeudi','vendredi','samedi'];
var PLAN_DCOL  = ['#0066CC','#8B5CF6','#00875A','#D97706','#DC2626','#6B7280'];
var P_START = 8, P_END = 20, P_ROW = 48, P_HEAD = 40;

// ── STATE ──────────────────────────────────────────────
var PL = {
  cycles:   JSON.parse(JSON.stringify(PLAN_DEFAULT_CYCLES)),
  students: [],
  sch:      null,
  locked:   [],
  teacher:  {id:'tp', name:'Mon Profil', instrument:'', color:'#5b4fcf', workSlots:[], breaks:[]},
  weights:  {wish:7, compact:5, stab:4},
  genMode:  'wishes',
  genMethod:'greedy',
  genSeed:  0,
  baseline: null,
  unplacedDiag: [],
  activeTab:    'students',
  schedView:    'week',
  schedDay:     0,
  undoStack:    [],
  redoStack:    [],
  swapResults:  [],
  // modal state
  modal: null,
  editStudent: null,
  cardStudent: null,
};

var planUidC = 1;
function planUid(){ return 'pu'+(planUidC++); }

// ── UTILS ──────────────────────────────────────────────
function t2m(t){ var p=t.split(':').map(Number); return p[0]*60+p[1]; }
function m2t(m){ return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
function m2px(m){ return ((m-P_START*60)/30)*P_ROW; }
function snapM(raw){ return Math.round((raw-P_START*60)/15)*15+P_START*60; }
function fmtH(m){ var h=Math.floor(m/60),mn=m%60; return mn?h+'h'+mn:h+'h'; }

function teacherAllows(day, s, e, teacher) {
  if (!teacher||!teacher.workSlots||!teacher.workSlots.length) return true;
  if (!teacher.workSlots.filter(function(w){return w.day===day;})
      .some(function(w){return t2m(w.start)<=s && e<=t2m(w.end);})) return false;
  return !teacher.breaks.filter(function(b){return b.day===day;})
    .some(function(b){return !(e<=t2m(b.start)||s>=t2m(b.end));});
}

// ── SCHEDULER ──────────────────────────────────────────
function buildSchedule(students, locked, teacher, mode, seed) {
  mode = mode||'wishes'; seed = seed||0;
  var sch = {}; PLAN_DKEYS.forEach(function(d){sch[d]=[];});
  function clash(day, s, e, xid){
    return sch[day].some(function(sl){return sl.studentId!==xid && !(e<=sl.startMin||s>=sl.endMin);});
  }
  locked.forEach(function(lk){
    var st=students.find(function(s){return s.id===lk.studentId;});
    if(!st)return;
    sch[lk.day].push({studentId:lk.studentId,startMin:lk.startMin,endMin:lk.startMin+st.cycle.duration,locked:true,availType:lk.availType||'preferred'});
  });
  function seededShuffle(arr, s){
    var a=arr.slice(), n=s*9301+49297;
    for(var i=a.length-1;i>0;i--){n=(n*9301+49297)%233280;var j=Math.floor((n/233280)*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}
    return a;
  }
  var unlocked = students.filter(function(s){return !locked.some(function(l){return l.studentId===s.id;});});
  unlocked = unlocked.slice().sort(function(a,b){
    var pa=(b.priority||3)-(a.priority||3);
    if(pa!==0)return pa;
    return a.availabilities.length-b.availabilities.length;
  });
  if(seed>0) unlocked=seededShuffle(unlocked,seed);

  unlocked.forEach(function(st){
    var placed=false;
    var wins = st.availabilities.filter(function(a){return a.type==='preferred';})
      .concat(st.availabilities.filter(function(a){return a.type==='possible';}));
    if(seed>0){
      var pref=seededShuffle(wins.filter(function(a){return a.type==='preferred';}),seed+st.id.length);
      var poss=seededShuffle(wins.filter(function(a){return a.type==='possible';}),seed+st.id.length+1);
      wins=pref.concat(poss);
    }
    if(mode==='compact'){
      var candidates=[];
      wins.forEach(function(av){
        var ws=t2m(av.start),we=t2m(av.end),dur=st.cycle.duration;
        for(var tt=ws;tt+dur<=we;tt+=30){
          if(!teacherAllows(av.day,tt,tt+dur,teacher)||clash(av.day,tt,tt+dur,st.id))continue;
          var dayBusy=(sch[av.day]||[]).length;
          candidates.push({day:av.day,startMin:tt,endMin:tt+dur,availType:av.type,score:-dayBusy*1000+tt});
        }
      });
      if(candidates.length>0){
        candidates.sort(function(a,b){return a.score-b.score;});
        var best=candidates[0];
        sch[best.day].push({studentId:st.id,startMin:best.startMin,endMin:best.endMin,locked:false,availType:best.availType});
        placed=true;
      }
    } else {
      wins.forEach(function(av){
        if(placed)return;
        var ws=t2m(av.start),we=t2m(av.end),dur=st.cycle.duration;
        for(var tt=ws;tt+dur<=we;tt+=30){
          if(!teacherAllows(av.day,tt,tt+dur,teacher)||clash(av.day,tt,tt+dur,st.id))continue;
          sch[av.day].push({studentId:st.id,startMin:tt,endMin:tt+dur,locked:false,availType:av.type});
          placed=true;break;
        }
      });
    }
  });
  return sch;
}

function listCandidates(student, teacher){
  var dur=student.cycle.duration;
  var wins=student.availabilities.filter(function(a){return a.type==='preferred';})
    .concat(student.availabilities.filter(function(a){return a.type==='possible';}));
  var cands=[];
  wins.forEach(function(av){
    var ws=t2m(av.start),we=t2m(av.end);
    for(var tt=ws;tt+dur<=we;tt+=30){
      if(!teacherAllows(av.day,tt,tt+dur,teacher))continue;
      cands.push({day:av.day,startMin:tt,endMin:tt+dur,availType:av.type});
    }
  });
  return cands;
}
function conflictsInPlan(plan, day, sMin, eMin, excludeId){
  var cl=[];
  Object.keys(plan).forEach(function(sid){
    if(sid===excludeId)return;
    var slot=plan[sid];
    if(slot.day===day && !(eMin<=slot.startMin||sMin>=slot.endMin)) cl.push(sid);
  });
  return cl;
}
function tryPlaceReloc(sid, plan, students, teacher, locked, depth, maxDepth, visited){
  if(depth>maxDepth)return false;
  var st=students.find(function(s){return s.id===sid;});
  if(!st)return false;
  if(locked.some(function(l){return l.studentId===sid;})&&plan[sid])return true;
  var cands=listCandidates(st,teacher);
  for(var ci=0;ci<cands.length;ci++){
    var cand=cands[ci];
    var lockedClash=locked.some(function(lk){
      var lslot=plan[lk.studentId];
      return lslot&&lslot.day===cand.day&&!(cand.endMin<=lslot.startMin||cand.startMin>=lslot.endMin);
    });
    if(lockedClash)continue;
    var clashing=conflictsInPlan(plan,cand.day,cand.startMin,cand.endMin,sid);
    if(clashing.length===0){plan[sid]=cand;return true;}
    if(depth>=maxDepth)continue;
    var saved={};var ok=true;var prevSid=plan[sid];
    plan[sid]=cand;
    for(var ki=0;ki<clashing.length;ki++){
      var otherId=clashing[ki];
      if(visited.has(otherId)||locked.some(function(l){return l.studentId===otherId;})){ok=false;break;}
      saved[otherId]=plan[otherId];
      delete plan[otherId];
      visited.add(otherId);
      var success=tryPlaceReloc(otherId,plan,students,teacher,locked,depth+1,maxDepth,visited);
      visited.delete(otherId);
      if(!success){ok=false;break;}
    }
    if(ok)return true;
    Object.keys(saved).forEach(function(k){if(saved[k])plan[k]=saved[k];else delete plan[k];});
    if(prevSid)plan[sid]=prevSid;else delete plan[sid];
  }
  return false;
}
function buildScheduleMaxCoverage(students, locked, teacher, maxDepth){
  maxDepth=maxDepth||3;
  var plan={};
  locked.forEach(function(lk){
    var st=students.find(function(s){return s.id===lk.studentId;});
    if(!st)return;
    plan[lk.studentId]={day:lk.day,startMin:lk.startMin,endMin:lk.startMin+st.cycle.duration,availType:lk.availType||'preferred'};
  });
  var unlocked=students.filter(function(s){return !locked.some(function(l){return l.studentId===s.id;});})
    .map(function(s){return {s:s,cnt:listCandidates(s,teacher).length};})
    .sort(function(a,b){var pp=(b.s.priority||3)-(a.s.priority||3);if(pp!==0)return pp;return a.cnt-b.cnt;})
    .map(function(x){return x.s;});
  unlocked.forEach(function(st){
    if(plan[st.id])return;
    tryPlaceReloc(st.id,plan,students,teacher,locked,0,maxDepth,new Set([st.id]));
  });
  var sch={};PLAN_DKEYS.forEach(function(d){sch[d]=[];});
  Object.keys(plan).forEach(function(sid){
    var slot=plan[sid];
    sch[slot.day].push({studentId:sid,startMin:slot.startMin,endMin:slot.endMin,
      locked:locked.some(function(l){return l.studentId===sid;}),availType:slot.availType});
  });
  return sch;
}

function diagnoseUnplaced(student, sch, teacher){
  if(!student.availabilities.length)return 'Aucune disponibilité renseignée';
  var anyTeacherOk=false,anyFreeSlot=false;
  student.availabilities.forEach(function(av){
    var ws=t2m(av.start),we=t2m(av.end),dur=student.cycle.duration;
    for(var tt=ws;tt+dur<=we;tt+=30){
      if(teacherAllows(av.day,tt,tt+dur,teacher)){
        anyTeacherOk=true;
        if(!(sch[av.day]||[]).some(function(s){return !(tt+dur<=s.startMin||tt>=s.endMin);})) anyFreeSlot=true;
      }
    }
  });
  if(!anyTeacherOk)return 'Hors des plages du professeur';
  if(!anyFreeSlot) return 'Conflit avec d\'autres élèves déjà placés';
  return 'Créneau trop court pour '+student.cycle.duration+'min';
}

function computeScore(sch, students, teacher, weights, baseline){
  var W=weights?Math.max(0,weights.wish||5):5;
  var C=weights?Math.max(0,weights.compact||5):5;
  var S=weights?Math.max(0,weights.stab||5):5;
  var sumW=(W+C+S)||1;
  if(!students.length)return {finalScore:0,label:'N/A',color:'#9CA3AF',preferred:0,possible:0,unplaced:0,total:0,fillRate:0,gaps:0};
  var preferred=0,possible=0,unplaced=0;
  students.forEach(function(st){
    var found=false;
    PLAN_DKEYS.forEach(function(d){
      var sl=(sch[d]||[]).find(function(s){return s.studentId===st.id;});
      if(sl){found=true;if(sl.availType==='preferred')preferred++;else possible++;}
    });
    if(!found)unplaced++;
  });
  var wishScore=Math.round((preferred*100+possible*60)/students.length);
  var gapPenalty=0,gaps=0;
  var totalCours=PLAN_DKEYS.reduce(function(a,d){return a+(sch[d]||[]).reduce(function(b,s){return b+(s.endMin-s.startMin);},0);},0);
  var totalWork=(teacher.workSlots||[]).reduce(function(a,w){return a+(t2m(w.end)-t2m(w.start));},0);
  var totalBrk=(teacher.breaks||[]).reduce(function(a,b){return a+(t2m(b.end)-t2m(b.start));},0);
  var totalAvail=Math.max(totalWork-totalBrk,0);
  var fillRate=totalAvail>0?Math.round(totalCours/totalAvail*100):0;
  PLAN_DKEYS.forEach(function(d){
    var sorted=(sch[d]||[]).slice().sort(function(a,b){return a.startMin-b.startMin;});
    for(var i=1;i<sorted.length;i++){var gap=sorted[i].startMin-sorted[i-1].endMin;if(gap>5){gaps++;gapPenalty+=Math.min(gap,120);}}
  });
  var compactScore=Math.max(0,100-Math.round(gapPenalty/Math.max(totalAvail,1)*100));
  var stabScore=70;
  if(baseline){
    var keep=0,tot=0;
    students.forEach(function(st){
      var curSlot=null,curDay=null;
      PLAN_DKEYS.forEach(function(d){var sl=(sch[d]||[]).find(function(s){return s.studentId===st.id;});if(sl){curSlot=sl;curDay=d;}});
      var prev=baseline[st.id];
      if(curSlot){tot++;if(prev&&prev.day===curDay&&prev.startMin===curSlot.startMin)keep++;}
    });
    stabScore=tot>0?Math.round(keep/tot*100):70;
  }
  var finalScore=Math.max(0,Math.min(100,Math.round((wishScore*W+compactScore*C+stabScore*S)/sumW)));
  var label=finalScore>=90?'Excellent':finalScore>=75?'Très bon':finalScore>=60?'Bon':finalScore>=40?'Moyen':'À optimiser';
  var color=finalScore>=90?'#00B894':finalScore>=75?'#0984E3':finalScore>=60?'#E17055':finalScore>=40?'#FBBF24':'#E84393';
  return {finalScore:finalScore,label:label,color:color,preferred:preferred,possible:possible,unplaced:unplaced,total:students.length,fillRate:fillRate,gaps:gaps};
}

function findSwaps(unplacedList, sch, students, teacher){
  var results=[];
  unplacedList.forEach(function(up){
    var opts=[];
    PLAN_DKEYS.forEach(function(day){
      (sch[day]||[]).forEach(function(slot){
        if(slot.locked)return;
        var blocker=students.find(function(s){return s.id===slot.studentId;});
        if(!blocker)return;
        var fits=up.availabilities.some(function(a){return a.day===day&&t2m(a.start)<=slot.startMin&&slot.startMin+up.cycle.duration<=t2m(a.end);})
          && teacherAllows(day,slot.startMin,slot.startMin+up.cycle.duration,teacher);
        if(!fits)return;
        var found=null;
        blocker.availabilities.filter(function(a){return a.type==='preferred';}).concat(blocker.availabilities.filter(function(a){return a.type==='possible';}))
          .forEach(function(av){
            if(found)return;
            var ws=t2m(av.start),we=t2m(av.end),dur=blocker.cycle.duration;
            for(var tt=ws;tt+dur<=we;tt+=30){
              if(av.day===day&&tt===slot.startMin)continue;
              if(!teacherAllows(av.day,tt,tt+dur,teacher))continue;
              if((sch[av.day]||[]).filter(function(s){return s.studentId!==blocker.id;}).some(function(s){return !(tt+dur<=s.startMin||tt>=s.endMin);}))continue;
              found={day:av.day,start:tt,type:av.type};break;
            }
          });
        if(found)opts.push({blockerId:blocker.id,blockerName:blocker.name,slotDay:day,slotStart:slot.startMin,newDay:found.day,newStart:found.start,newType:found.type});
      });
    });
    if(opts.length)results.push({student:up,swaps:opts.slice(0,3)});
  });
  return results;
}

function computeStats(sch, students, cycles, teacher){
  var dayStats=PLAN_DKEYS.map(function(day){
    var slots=sch[day]||[];
    var cours=slots.reduce(function(a,s){return a+(s.endMin-s.startMin);},0);
    var work=(teacher.workSlots||[]).filter(function(w){return w.day===day;}).reduce(function(a,w){return a+(t2m(w.end)-t2m(w.start));},0);
    var brk=(teacher.breaks||[]).filter(function(b){return b.day===day;}).reduce(function(a,b){return a+(t2m(b.end)-t2m(b.start));},0);
    var avail=Math.max(work-brk,0);
    return {day:day,label:PLAN_DAYS[PLAN_DKEYS.indexOf(day)],cours:cours,avail:avail,count:slots.length,pct:avail>0?Math.round(cours/avail*100):0};
  }).filter(function(d){return d.avail>0||d.count>0;});
  var cycleStats=cycles.map(function(cy){
    var n=0;
    PLAN_DKEYS.forEach(function(d){(sch[d]||[]).forEach(function(sl){var st=students.find(function(s){return s.id===sl.studentId;});if(st&&st.cycle&&st.cycle.id===cy.id)n++;});});
    return Object.assign({},cy,{count:n});
  }).filter(function(c){return c.count>0;});
  var totalCours=dayStats.reduce(function(a,d){return a+d.cours;},0);
  var totalWork=(teacher.workSlots||[]).reduce(function(a,w){return a+(t2m(w.end)-t2m(w.start));},0);
  var totalBrk=(teacher.breaks||[]).reduce(function(a,b){return a+(t2m(b.end)-t2m(b.start));},0);
  var totalAvail=Math.max(totalWork-totalBrk,0);
  return {dayStats:dayStats,cycleStats:cycleStats,totalCours:totalCours,totalAvail:totalAvail,pct:totalAvail>0?Math.round(totalCours/totalAvail*100):0};
}

// ── FIREBASE SYNC ──────────────────────────────────────
function planSave(){
  try {
    if(typeof fbDb==='undefined'||!fbDb)return;
    var uid=(typeof currentUser!=='undefined'&&currentUser)?currentUser.uid:null;
    if(!uid)return;
    if(!PL.students.length&&!PL.sch&&!PL.teacher.workSlots.length)return;
    var data={
      cycles:PL.cycles, students:PL.students, sch:PL.sch,
      locked:PL.locked, teacher:PL.teacher, weights:PL.weights,
      genMode:PL.genMode, genMethod:PL.genMethod
    };
    fbDb.ref('conservatoire/'+uid).set(data).catch(function(){});
  } catch(e){}
}

function planLoad(cb){
  try {
    if(typeof fbDb==='undefined'||!fbDb){if(cb)cb();return;}
    var uid=(typeof currentUser!=='undefined'&&currentUser)?currentUser.uid:'anon';
    fbDb.ref('conservatoire/'+uid).once('value').then(function(snap){
      var d=snap.val();
      if(d){
        if(d.cycles&&d.cycles.length)PL.cycles=d.cycles;
        if(d.students&&d.students.length)PL.students=d.students;
        if(d.sch)PL.sch=d.sch;
        if(d.locked)PL.locked=d.locked;
        if(d.teacher)PL.teacher=d.teacher;
        if(d.weights)PL.weights=d.weights;
        if(d.genMode)PL.genMode=d.genMode;
        if(d.genMethod)PL.genMethod=d.genMethod;
      }
      if(cb)cb();
    }).catch(function(){if(cb)cb();});
  } catch(e){if(cb)cb();}
}

window._PLAN = {

};
